<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Izuke – Moment</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #d9dadc; font-family: 'Inter', sans-serif; }

  .phone {
    width: 390px;
    height: 844px;
    background: #f9f9fb;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 32px 80px rgba(0,0,0,0.18);
    border-radius: 48px;
  }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 12px;
    padding: 6px 20px 12px;
    flex-shrink: 0;
  }
  .back-btn {
    background: none; border: none; cursor: pointer;
    color: #FF3B5C; display: flex; align-items: center; padding: 2px;
  }
  .header .wordmark {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 900; font-size: 16px; letter-spacing: 0.14em;
    color: #FF3B5C;
  }

  /* Scroll body */
  .scroll-body {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 8px 20px 32px;
    -webkit-overflow-scrolling: touch;
  }
  .scroll-body::-webkit-scrollbar { display: none; }

  /* Moment card */
  .moment-card {
    border-radius: 26px;
    overflow: hidden;
    box-shadow: 0 18px 40px rgba(15,27,53,0.18);
    margin-bottom: 22px;
    transform: translateY(10px); opacity: 0;
    animation: rise 0.6s cubic-bezier(0.16,1,0.3,1) 0.05s forwards;
  }
  @keyframes rise { to { transform: translateY(0); opacity: 1; } }

  .moment-photo {
    position: relative; width: 100%; aspect-ratio: 4/5; overflow: hidden;
    background: #161435;
  }
  .moment-photo img {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
  }
  /* darken top + bottom, leave middle clear for the glass card */
  .photo-scrim {
    position: absolute; inset: 0;
    background:
      linear-gradient(to bottom, rgba(15,27,53,0.55) 0%, transparent 22%),
      linear-gradient(to top, rgba(15,27,53,0.92) 0%, transparent 40%);
  }
  /* Top-left: verified + title */
  .moment-head {
    position: absolute; top: 22px; left: 22px; right: 22px; z-index: 2;
  }
  .verified-pill {
    display: inline-flex; align-items: center; gap: 5px;
    background: #FF3B5C; color: #fff;
    padding: 5px 12px; border-radius: 9999px;
    margin-bottom: 12px;
  }
  .verified-pill .material-symbols-outlined { font-size: 13px !important; }
  .verified-pill span.lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
  }
  .moment-title {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 800; font-size: 30px; color: #fff; line-height: 1;
    letter-spacing: -0.02em;
  }
  /* Center: glass synergy card */
  .synergy-wrap {
    position: absolute; inset: 0; z-index: 2;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .synergy-card {
    background: rgba(15,27,53,0.40);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 16px 18px;
    display: flex; flex-direction: column; align-items: center;
  }
  .synergy-names {
    display: flex; align-items: center; gap: 16px; margin-bottom: 6px;
  }
  .synergy-names .nm {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 800; font-size: 22px; color: rgba(255,255,255,0.92);
  }
  .synergy-names .material-symbols-outlined { font-size: 22px !important; color: #FF3B5C; }
  .synergy-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    color: rgba(255,255,255,0.6); text-transform: uppercase;
  }
  /* Bottom: stats grid */
  .stats-strip {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 2;
    display: flex;
    padding: 22px;
  }
  .stat {
    flex: 1; text-align: center;
    display: flex; flex-direction: column; gap: 5px;
  }
  .stat + .stat { border-left: 1px solid rgba(255,255,255,0.14); }
  .stat .cap {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700; letter-spacing: 0.10em;
    text-transform: uppercase; color: #FF3B5C;
  }
  .stat .val {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 700; font-size: 20px; color: rgba(255,255,255,0.92);
  }
  .stat .val small { font-size: 11px; font-weight: 700; opacity: 0.8; }

  /* Buttons */
  .btn-share {
    width: 100%; height: 54px; border: none; border-radius: 9999px;
    background: linear-gradient(135deg, #FF3B5C, #BA0035); color: #fff;
    font-family: 'Inter', sans-serif;
    font-weight: 500; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 8px 20px rgba(255,59,92,0.28);
    transition: transform 0.15s; margin-bottom: 12px;
  }
  .btn-share:active { transform: scale(0.97); }
  .btn-share .material-symbols-outlined { font-size: 19px !important; }
  .btn-done {
    width: 100%; height: 54px; border: 1.5px solid #6b7280; border-radius: 9999px;
    background: #fff; color: #0F1B35;
    font-family: 'Inter', sans-serif;
    font-weight: 500; font-size: 16px; cursor: pointer;
    transition: transform 0.15s;
  }
  .btn-done:active { transform: scale(0.97); }

  /* Saved confirmation */
  .saved-note {
    display: flex; align-items: center; gap: 14px;
    background: #fff;
    border: 1px solid #e8e8ea;
    border-radius: 16px;
    padding: 16px;
    margin-top: 20px;
  }
  .saved-icon {
    width: 40px; height: 40px; border-radius: 50%;
    background: #0F1B35;
    display: flex; align-items: center; justify-content: center;
    color: #FF3B5C; flex-shrink: 0;
  }
  .saved-icon .material-symbols-outlined { font-size: 22px !important; }
  .saved-body { flex: 1; }
  .saved-body .t {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 800; font-size: 14px; color: #0F1B35;
  }
  .saved-body .s { font-size: 12px; color: #535e7b; margin-top: 2px; line-height: 1.4; }
  .saved-check { color: #16A34A; flex-shrink: 0; }
  .saved-check .material-symbols-outlined { font-size: 24px !important; }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
  }
  .filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>

<body style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
<div class="phone">

  <!-- Status bar -->
  <div style="height:48px; display:flex; align-items:center; padding:0 24px; flex-shrink:0;">
    <span style="font-family:'Hanken Grotesk',sans-serif; font-weight:700; font-size:15px; color:#0F1B35;">9:41</span>
  </div>

  <!-- Header -->
  <div class="header">
    <button class="back-btn" onclick="window.location.href='chat.html'">
      <span class="material-symbols-outlined" style="font-size:24px;">arrow_back</span>
    </button>
    <span class="wordmark">IZUKE</span>
  </div>

  <!-- Scroll body -->
  <div class="scroll-body">

    <!-- Moment card -->
    <div class="moment-card">
      <div class="moment-photo">
        <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBMulCzMzQa3vQmlqP_T2gK6Pu4ZfcI4OGq5FVYZnHb55fxdLVHsseg5XDTy353fVYrnDY-gueCO0BSKafyUGaPNJoD36BdQ6TG1mjJBw_n5ZFLqckj_bEzPGfnmmUSNMhL1HDcsFR6xoBQXtZaFxt_Ugf2nFz0RRC3xdoBx1ibFvXWN0jvG7mLCHJ7HYAX6kWgDVwanpxU1xo_rnuQlazbkj5BuvIk9UryAZaPk3YydV3Qjr1c4LiqcqF0GoceIxpAuqXBV2HfPtoi" alt="Skyline Summit">
        <div class="photo-scrim"></div>

        <!-- Top-left: verified -->
        <div class="moment-head">
          <div class="verified-pill">
            <span class="material-symbols-outlined filled">verified</span>
            <span class="lbl">VERIFIED RUN</span>
          </div>
        </div>

        <!-- Center: glass synergy card -->
        <div class="synergy-wrap">
          <div class="synergy-card">
            <div class="synergy-names">
              <span class="nm">Charles</span>
              <span class="material-symbols-outlined filled">bolt</span>
              <span class="nm">Alex</span>
            </div>
            <span class="synergy-label">Synergy Moment</span>
          </div>
        </div>

        <!-- Bottom: stats -->
        <div class="stats-strip">
          <div class="stat">
            <span class="cap">Distance</span>
            <span class="val">8.42<small> KM</small></span>
          </div>
          <div class="stat">
            <span class="cap">Pace</span>
            <span class="val">4:52<small> /KM</small></span>
          </div>
          <div class="stat">
            <span class="cap">Duration</span>
            <span class="val">41:02</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <button class="btn-share">
      <span class="material-symbols-outlined filled">share</span>
      Share on Socials
    </button>
    <button class="btn-done" onclick="window.location.href='map_home.html'">Done</button>

    <!-- Saved confirmation -->
    <div class="saved-note">
      <div class="saved-icon">
        <span class="material-symbols-outlined filled">bookmark</span>
      </div>
      <div class="saved-body">
        <div class="t">Moment Saved</div>
        <div class="s">This moment was added to your Activity Feed and Moments collection.</div>
      </div>
      <div class="saved-check">
        <span class="material-symbols-outlined filled">check_circle</span>
      </div>
    </div>

  </div>

</div>
  <script src="_nav.js"></script>
</body>
</html>
