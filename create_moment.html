<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Izuke – Capture the Moment</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #d9dadc; font-family: 'Inter', sans-serif; }

  .phone {
    width: 390px;
    height: 844px;
    background: #f9f9fb;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 32px 80px rgba(0,0,0,0.18);
    border-radius: 48px;
  }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 20px 12px;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .close-btn {
    background: none; border: none; cursor: pointer;
    color: #FF3B5C; display: flex; align-items: center; padding: 2px;
  }
  .header h1 {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 800; font-size: 20px; color: #0F1B35;
  }
  .pair-avatars { display: flex; }
  .pair-avatars .av {
    width: 34px; height: 34px; border-radius: 50%;
    border: 2px solid #f9f9fb; object-fit: cover;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 800; font-size: 13px;
  }
  .pair-avatars .av:nth-child(2) { margin-left: -10px; }

  /* Scroll body */
  .scroll-body {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 8px 20px 0;
    -webkit-overflow-scrolling: touch;
  }
  .scroll-body::-webkit-scrollbar { display: none; }

  /* Field label */
  .field-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: #535e7b; margin-bottom: 10px;
  }

  /* Upload dropzone */
  .dropzone {
    width: 100%; aspect-ratio: 16/11;
    background: #e8e8ea;
    border: 2px dashed #f0a8b4;
    border-radius: 16px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; cursor: pointer;
    margin-bottom: 24px;
    overflow: hidden; position: relative;
    transition: border-color 0.2s;
  }
  .dropzone:active { border-color: #FF3B5C; }
  .dropzone .material-symbols-outlined { font-size: 38px !important; color: #FF3B5C; }
  .dropzone .up-title {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 800; font-size: 20px; color: #0F1B35;
  }
  .dropzone .up-sub { font-size: 13px; color: #535e7b; }
  .dropzone img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; display: none;
  }

  /* Inputs */
  .input-field {
    width: 100%; height: 54px;
    background: #fff;
    border: 1px solid #e2e2e4;
    border-radius: 14px;
    padding: 0 16px;
    font-family: 'Inter', sans-serif; font-size: 16px; color: #0F1B35;
    outline: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 24px;
  }
  .input-field:focus { border-color: #FF3B5C; box-shadow: 0 0 0 3px rgba(255,59,92,0.08); }
  .input-field::placeholder { color: #bbb; }

  /* Stat pair row */
  .stat-row { display: flex; gap: 16px; margin-bottom: 24px; }
  .stat-col { flex: 1; }
  .stat-input-wrap {
    position: relative;
  }
  .stat-input {
    width: 100%; height: 54px;
    background: #fff; border: 1px solid #e2e2e4; border-radius: 14px;
    padding: 0 52px 0 16px;
    font-family: 'Hanken Grotesk', sans-serif; font-weight: 800;
    font-size: 18px; color: #0F1B35;
    outline: none; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .stat-input:focus { border-color: #FF3B5C; box-shadow: 0 0 0 3px rgba(255,59,92,0.08); }
  .stat-unit {
    position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 700; color: #535e7b;
    pointer-events: none;
  }

  /* Note */
  .note-area {
    width: 100%; min-height: 120px;
    background: #fff; border: 1px solid #e2e2e4; border-radius: 14px;
    padding: 14px 16px; resize: none;
    font-family: 'Inter', sans-serif; font-size: 15px; color: #0F1B35;
    outline: none; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 24px; line-height: 1.5;
  }
  .note-area:focus { border-color: #FF3B5C; box-shadow: 0 0 0 3px rgba(255,59,92,0.08); }
  .note-area::placeholder { color: #bbb; }

  /* divider with bolt */
  .bolt-divider {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 8px;
  }
  .bolt-divider hr { flex: 1; border: none; border-top: 1px solid #e2e2e4; }
  .bolt-divider .material-symbols-outlined { font-size: 20px !important; color: #f0a8b4; }

  /* Footer */
  .footer {
    padding: 14px 20px 32px;
    flex-shrink: 0;
  }
  .btn-save {
    width: 100%; height: 56px; border: none; border-radius: 9999px;
    background: linear-gradient(135deg, #FF3B5C, #BA0035); color: #fff;
    font-family: 'Inter', sans-serif;
    font-weight: 500; font-size: 16px; cursor: pointer;
    box-shadow: 0 8px 24px rgba(255,59,92,0.30);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform 0.15s;
  }
  .btn-save:active { transform: scale(0.97); }
  .btn-save .material-symbols-outlined { font-size: 20px !important; }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
  }
  .filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>

<body style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
<div class="phone">

  <!-- Status bar -->
  <div style="height:48px; display:flex; align-items:center; padding:0 24px; flex-shrink:0;">
    <span style="font-family:'Hanken Grotesk',sans-serif; font-weight:700; font-size:15px; color:#0F1B35;">9:41</span>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <button class="close-btn" onclick="window.location.href='chat.html'">
        <span class="material-symbols-outlined" style="font-size:26px;">close</span>
      </button>
      <h1>Capture the Moment</h1>
    </div>
    <div class="pair-avatars">
      <div class="av" style="background:linear-gradient(135deg,#0F1B35,#2d3748);">C</div>
      <div class="av" style="background:linear-gradient(135deg,#4A90E2,#2563EB);">A</div>
    </div>
  </div>

  <!-- Scroll body -->
  <div class="scroll-body">

    <!-- Photo -->
    <p class="field-label">Shared Run Photo</p>
    <div class="dropzone" onclick="document.getElementById('photo-input').click()">
      <span class="material-symbols-outlined filled">add_a_photo</span>
      <span class="up-title">Upload Photo</span>
      <span class="up-sub">High-res JPEG or PNG preferred</span>
      <img id="photo-preview" alt="">
    </div>
    <input type="file" id="photo-input" accept="image/*" style="display:none;" onchange="previewPhoto(this)">

    <!-- Title -->
    <p class="field-label">Run Title</p>
    <input class="input-field" type="text" value="Morning Sunrise Dash" placeholder="Name this run">

    <!-- Distance + Duration -->
    <div class="stat-row">
      <div class="stat-col">
        <p class="field-label">Distance</p>
        <div class="stat-input-wrap">
          <input class="stat-input" type="text" value="5.20">
          <span class="stat-unit">KM</span>
        </div>
      </div>
      <div class="stat-col">
        <p class="field-label">Duration</p>
        <div class="stat-input-wrap">
          <input class="stat-input" type="text" value="24:15">
          <span class="stat-unit">MIN</span>
        </div>
      </div>
    </div>

    <!-- Shared note -->
    <p class="field-label">Shared Note</p>
    <textarea class="note-area" placeholder="How was the pace? Great energy today…">How was the pace? Great energy today…</textarea>

    <!-- Bolt divider -->
    <div class="bolt-divider">
      <hr>
      <span class="material-symbols-outlined filled">bolt</span>
      <hr>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-save" onclick="window.location.href='moment_detail.html'">
      Save Moment
      <span class="material-symbols-outlined filled">celebration</span>
    </button>
  </div>

</div>

<script>
  function previewPhoto(input) {
    if (!input.files || !input.files[0]) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('photo-preview');
      img.src = e.target.result;
      img.style.display = 'block';
    };
    reader.readAsDataURL(input.files[0]);
  }
</script>
  <script src="_nav.js"></script>
</body>
</html>
