<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Izuke – Onboarding 2</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@700;800;900&family=Inter:wght@400;500&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  html, body { height: 100%; margin: 0; background: #d9dadc; }

  .phone {
    width: 390px;
    min-height: 844px;
    background: #F5F5F7;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 32px 80px rgba(0,0,0,0.18);
    border-radius: 48px;
  }

  /* Slide-in entrance */
  .slide-content {
    opacity: 0;
    transform: translateX(32px);
    animation: slide-in 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    animation-delay: 0.05s;
  }
  @keyframes slide-in {
    to { opacity: 1; transform: translateX(0); }
  }

  /* Text stagger */
  .text-enter {
    opacity: 0;
    transform: translateY(14px);
    animation: text-up 0.5s ease-out forwards;
  }
  @keyframes text-up {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Shield icon bounce-in */
  .icon-bounce {
    opacity: 0;
    transform: scale(0.5);
    animation: icon-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    animation-delay: 0.15s;
  }
  @keyframes icon-in {
    to { opacity: 1; transform: scale(1); }
  }


  /* Shimmer on the shield */
  .shield-card {
    width: 160px; height: 160px;
    border-radius: 44px;
    background: linear-gradient(135deg, #FF3B5C 0%, #BA0035 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 16px 48px rgba(255,59,92,0.30);
  }
  .shield-card::after {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 60%; height: 200%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
    transform: skewX(-15deg);
    animation: shimmer 3.5s ease-in-out infinite;
    animation-delay: 0.8s;
  }
  @keyframes shimmer {
    0%   { left: -60%; }
    100% { left: 120%;  }
  }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }

  .dot-active {
    width: 24px; height: 8px;
    background: #FF3B5C;
    border-radius: 9999px;
  }
  .dot-inactive {
    width: 8px; height: 8px;
    background: #e2e2e4;
    border-radius: 9999px;
  }

  .cta-btn {
    width: 100%; height: 56px;
    border: none; cursor: pointer;
    border-radius: 9999px;
    background: linear-gradient(135deg, #FF3B5C 0%, #BA0035 100%);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 8px 24px rgba(255,59,92,0.30);
    transition: transform 0.15s ease;
  }
  .cta-btn:active { transform: scale(0.97); }
</style>
</head>

<body class="flex items-center justify-center min-h-screen">
<div class="phone">

  <!-- Header -->
  <header class="flex justify-between items-center px-6 pt-14 pb-2">
    <div style="position:relative; width:44px; height:44px;">
      <svg width="44" height="44" style="transform:rotate(-90deg);">
        <circle cx="22" cy="22" r="18" fill="transparent" stroke="#e2e2e4" stroke-width="3"/>
        <circle cx="22" cy="22" r="18" fill="transparent" stroke="#FF3B5C" stroke-width="3"
                stroke-linecap="round" stroke-dasharray="113.1" stroke-dashoffset="38.5"/>
      </svg>
      <span style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700; color:#FF3B5C;">66%</span>
    </div>
    <a href="auth.html"
       style="font-family:'Inter',sans-serif; font-size:15px; font-weight:500; color:#535e7b; text-decoration:none;">
      SKIP
    </a>
  </header>

  <!-- Main -->
  <main class="flex-1 flex flex-col items-center justify-start px-6 pt-6 pb-4 slide-content">

    <!-- Hero icon -->
    <div style="position:relative; width:300px; height:300px; display:flex; align-items:center; justify-content:center; margin-bottom:36px;">
      <!-- Static concentric circles (decorative, matches design) -->
      <div style="position:absolute; width:260px; height:260px; border-radius:50%; border:1.5px solid #e2e2e4;"></div>
      <div style="position:absolute; width:300px; height:300px; border-radius:50%; border:1.5px solid #ebebeb;"></div>

      <!-- Shield card -->
      <div class="shield-card icon-bounce">
        <span class="material-symbols-outlined" style="font-size:80px; color:#fff;">verified_user</span>
      </div>

      <!-- Floating check badge (top-right) -->
      <div style="position:absolute; top:42px; right:24px; width:44px; height:44px; background:#fff; border-radius:14px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(0,0,0,0.10); animation:icon-in 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; animation-delay:0.5s; opacity:0;">
        <span class="material-symbols-outlined" style="font-size:24px; color:#008656;">check_circle</span>
      </div>
    </div>

    <!-- Text -->
    <div style="text-align:center; max-width:300px;">
      <h1 class="text-enter"
          style="font-family:'Hanken Grotesk',sans-serif; font-weight:800; font-size:30px; line-height:1.15; letter-spacing:-0.02em; color:#0F1B35; margin:0 0 12px; animation-delay:0.25s;">
        Run with People<br>You Can Trust.
      </h1>
      <p class="text-enter"
         style="font-family:'Inter',sans-serif; font-size:16px; line-height:1.6; color:#535e7b; margin:0; animation-delay:0.35s;">
        Optional verification adds a trust badge to your profile, so runners feel comfortable saying yes.
      </p>
    </div>

  </main>

  <!-- Footer -->
  <footer style="padding:0 24px 44px; display:flex; flex-direction:column; align-items:center; gap:20px;">
    <div style="display:flex; align-items:center; gap:6px;">
      <div class="dot-inactive"></div>
      <div class="dot-active"></div>
      <div class="dot-inactive"></div>
    </div>
    <button class="cta-btn" onclick="window.location.href='onboarding_3.html'">
      Next
      <span class="material-symbols-outlined" style="font-size:20px;">arrow_forward</span>
    </button>
  </footer>

</div>
  <script src="_nav.js"></script>
</body>
</html>
