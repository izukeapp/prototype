<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Izuke – Log a Run</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #d9dadc; font-family: 'Inter', sans-serif; }

  .phone {
    width: 390px;
    height: 844px;
    background: #fff;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 32px 80px rgba(0,0,0,0.18);
    border-radius: 48px;
  }

  /* Nav bar */
  .nav-bar {
    height: 56px;
    display: flex; align-items: center;
    padding: 0 16px;
    background: #fff;
    flex-shrink: 0;
    position: relative;
  }
  .nav-back {
    width: 40px; height: 40px;
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #1a1c1d;
  }
  .nav-title {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 800; font-size: 20px; color: #0F1B35;
  }

  /* Scroll body */
  .scroll-body {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 18px 20px 16px;
    -webkit-overflow-scrolling: touch;
  }
  .scroll-body::-webkit-scrollbar { display: none; }

  /* Privacy toggle row */
  .privacy-row {
    display: flex; align-items: center; gap: 12px;
    background: #f3f3f5;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 20px;
  }
  .privacy-row .material-symbols-outlined.lead { color: #535e7b; font-size: 20px !important; }
  .privacy-text { flex: 1; font-size: 15px; color: #535e7b; }
  .privacy-text b { color: #0F1B35; font-weight: 700; }
  /* iOS toggle */
  .ios-toggle { position: relative; width: 51px; height: 31px; cursor: pointer; flex-shrink: 0; }
  .ios-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .ios-toggle .track {
    position: absolute; inset: 0;
    background: #d4d4d8; border-radius: 9999px; transition: background 0.2s;
  }
  .ios-toggle input:checked + .track { background: #FF3B5C; }
  .ios-toggle .thumb {
    position: absolute; top: 2px; left: 2px;
    width: 27px; height: 27px; background: #fff; border-radius: 50%;
    box-shadow: 0 1px 4px rgba(0,0,0,0.22); transition: transform 0.2s;
    pointer-events: none;
  }
  .ios-toggle input:checked ~ .thumb { transform: translateX(20px); }

  /* Photo upload */
  .dropzone {
    width: 100%; height: 140px;
    background: #f3f3f5;
    border: 2px dashed #d4d4d8;
    border-radius: 16px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; cursor: pointer; margin-bottom: 22px;
    overflow: hidden; position: relative;
    transition: border-color 0.2s;
  }
  .dropzone:active { border-color: #FF3B5C; }
  .dropzone .material-symbols-outlined { font-size: 32px !important; color: #FF3B5C; }
  .dropzone .up-title {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 700; font-size: 15px; color: #0F1B35;
  }
  .dropzone .up-sub { font-size: 12px; color: #999; }
  .dropzone img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; display: none;
  }

  /* Unit toggle (top-right above stats) */
  .unit-row { display: flex; justify-content: flex-end; margin-bottom: 12px; }
  .unit-toggle { display: flex; background: #f3f3f5; border-radius: 9999px; padding: 3px; }
  .unit-toggle button {
    border: none; background: transparent; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700;
    color: #906f70; padding: 5px 14px; border-radius: 9999px;
  }
  .unit-toggle button.active { background: #FF3B5C; color: #fff; }

  /* Distance + Duration cards */
  .stat-grid { display: flex; gap: 14px; margin-bottom: 26px; }
  .stat-box {
    flex: 1;
    background: #f3f3f5;
    border-radius: 16px;
    padding: 16px 18px;
  }
  .stat-box .lbl {
    font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 600; color: #535e7b; margin-bottom: 8px;
  }
  .stat-box input {
    width: 100%; border: none; background: transparent; outline: none;
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 800; font-size: 34px; color: #0F1B35;
    letter-spacing: -0.01em;
  }
  .stat-box input::placeholder { color: #b8b8be; }

  /* How was it */
  .q-label {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 800; font-size: 16px; color: #0F1B35; margin-bottom: 14px;
  }
  .feel-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
  .feel-chip {
    padding: 13px 22px; border-radius: 9999px;
    border: none; cursor: pointer;
    background: #f3f3f5; color: #0F1B35;
    font-family: 'Hanken Grotesk', sans-serif; font-weight: 700; font-size: 16px;
    transition: all 0.15s;
  }
  .feel-chip.active { background: #FF3B5C; color: #fff; }

  /* Note */
  .note-area {
    width: 100%; min-height: 130px;
    background: #f3f3f5; border: none; border-radius: 16px;
    padding: 16px; resize: none;
    font-family: 'Inter', sans-serif; font-size: 16px; color: #0F1B35;
    outline: none; margin-bottom: 8px; line-height: 1.5;
  }
  .note-area::placeholder { color: #999; }

  /* Footer */
  .footer { padding: 14px 20px 32px; flex-shrink: 0; }
  .btn-save {
    width: 100%; height: 56px; border: none; border-radius: 9999px;
    background: linear-gradient(135deg, #FF3B5C, #BA0035); color: #fff;
    font-family: 'Inter', sans-serif;
    font-weight: 500; font-size: 16px; cursor: pointer;
    box-shadow: 0 8px 24px rgba(255,59,92,0.28);
    transition: transform 0.15s;
  }
  .btn-save:active { transform: scale(0.97); }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
  }
  .filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>

<body style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
<div class="phone">

  <!-- Status bar -->
  <div style="height:48px; display:flex; align-items:center; padding:0 24px; flex-shrink:0;">
    <span style="font-family:'Hanken Grotesk',sans-serif; font-weight:700; font-size:15px; color:#0F1B35;">9:41</span>
  </div>

  <!-- Nav bar -->
  <div class="nav-bar">
    <button class="nav-back" onclick="window.location.href='journal.html'">
      <span class="material-symbols-outlined" style="font-size:24px;">arrow_back</span>
    </button>
    <span class="nav-title">How did your run go?</span>
  </div>

  <!-- Scroll body -->
  <div class="scroll-body">

    <!-- Privacy toggle -->
    <div class="privacy-row">
      <span class="material-symbols-outlined lead" id="privacy-icon">lock</span>
      <span class="privacy-text" id="privacy-text"><b>Private</b> — only you can see it</span>
      <label class="ios-toggle">
        <input type="checkbox" id="privacy-toggle" onchange="togglePrivacy(this)">
        <div class="track"></div>
        <div class="thumb"></div>
      </label>
    </div>

    <!-- Photo upload -->
    <div class="dropzone" onclick="document.getElementById('photo-input').click()">
      <span class="material-symbols-outlined filled">add_a_photo</span>
      <span class="up-title">Add a photo</span>
      <span class="up-sub">Capture your run (optional)</span>
      <img id="photo-preview" alt="">
    </div>
    <input type="file" id="photo-input" accept="image/*" style="display:none;" onchange="previewPhoto(this)">

    <!-- Unit toggle -->
    <div class="unit-row">
      <div class="unit-toggle">
        <button id="unit-mi" onclick="setUnit('mi')">mi</button>
        <button class="active" id="unit-km" onclick="setUnit('km')">km</button>
      </div>
    </div>

    <!-- Distance + Duration -->
    <div class="stat-grid">
      <div class="stat-box">
        <div class="lbl">Distance (<span id="dist-unit">km</span>)</div>
        <input type="text" inputmode="decimal" placeholder="0.0" value="0.0">
      </div>
      <div class="stat-box">
        <div class="lbl">Duration</div>
        <input type="text" inputmode="numeric" placeholder="0:00" value="44:00">
      </div>
    </div>

    <!-- How was it -->
    <p class="q-label">How was it?</p>
    <div class="feel-row">
      <button class="feel-chip" onclick="selectFeel(this)">Easy</button>
      <button class="feel-chip active" onclick="selectFeel(this)">Moderate</button>
      <button class="feel-chip" onclick="selectFeel(this)">Hard</button>
      <button class="feel-chip" onclick="selectFeel(this)">PR! &#127942;</button>
    </div>

    <!-- Note -->
    <textarea class="note-area" placeholder="Add a note about this run…"></textarea>

  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-save" onclick="window.location.href='journal.html'">Save to Journal</button>
  </div>

</div>

<script>
  function togglePrivacy(cb) {
    const icon = document.getElementById('privacy-icon');
    const text = document.getElementById('privacy-text');
    if (cb.checked) {
      icon.textContent = 'public';
      text.innerHTML = '<b>Public</b> — visible on your profile';
    } else {
      icon.textContent = 'lock';
      text.innerHTML = '<b>Private</b> — only you can see it';
    }
  }

  function setUnit(u) {
    document.getElementById('unit-mi').classList.toggle('active', u === 'mi');
    document.getElementById('unit-km').classList.toggle('active', u === 'km');
    document.getElementById('dist-unit').textContent = u;
  }

  function selectFeel(el) {
    document.querySelectorAll('.feel-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
  }

  function previewPhoto(input) {
    if (!input.files || !input.files[0]) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('photo-preview');
      img.src = e.target.result;
      img.style.display = 'block';
    };
    reader.readAsDataURL(input.files[0]);
  }
</script>
</body>
</html>
