<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Izuke – Splash</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,700;0,800;0,900;1,900&family=Inter:wght@400;500&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  /*
   * FLUTTER TRANSLATION GUIDE (per animation):
   * - Glow blob pulse     → AnimatedOpacity + TweenAnimationBuilder (repeat)
   * - Kinetic rings       → CustomPainter + AnimationController (staggered)
   * - Logo bounce-in      → ScaleTransition + CurvedAnimation(curve: Curves.elasticOut)
   * - Letter reveal       → Staggered FadeTransition + SlideTransition per character
   * - Tagline typing      → Timer-based setState incrementing a substring
   * - Loading label cycle → Timer-based setState swapping strings
   * - Progress bar fill   → TweenAnimationBuilder(tween: Tween(0.0, 1.0)) on width
   * - Shimmer             → CustomPainter sliding gradient (or shimmer package)
   * - Button slide-up     → SlideTransition + FadeTransition after Future.delayed
   */

  html, body { height: 100%; margin: 0; background: #d9dadc; }

  /* ── Phone shell ── */
  .phone {
    width: 390px;
    min-height: 844px;
    background: #f9f9fb;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 72px 28px 44px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.18);
    border-radius: 48px;
  }

  /* ── Velocity-pink glow blob behind logo ── */
  /* Flutter: AnimatedOpacity + BoxDecoration blur via ImageFilter */
  .glow-blob {
    position: absolute;
    width: 260px;
    height: 260px;
    background: radial-gradient(circle, #FF3B5C 0%, transparent 70%);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -56%);
    opacity: 0;
    filter: blur(60px);
    animation: glow-pulse 3s ease-in-out infinite;
    animation-delay: 0.2s;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes glow-pulse {
    0%   { opacity: 0;    }
    30%  { opacity: 0.18; }
    60%  { opacity: 0.10; }
    100% { opacity: 0.18; }
  }


  /* ── Logo mark bounce-in ── */
  /* Flutter: ScaleTransition(scale: CurvedAnimation(curve: Curves.elasticOut)) */
  .logo-mark {
    width: 72px;
    height: 72px;
    border-radius: 20px;
    background: linear-gradient(135deg, #FF3B5C 0%, #BA0035 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 24px rgba(255,59,92,0.35);
    opacity: 0;
    transform: scale(0.4);
    animation: logo-bounce 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    animation-delay: 0.3s;
    position: relative;
    z-index: 2;
  }
  @keyframes logo-bounce {
    to { opacity: 1; transform: scale(1); }
  }
  .logo-mark span {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 900;
    font-style: italic;
    font-size: 30px;
    color: #ffffff;
    letter-spacing: -0.04em;
    line-height: 1;
  }

  /* ── Letter-by-letter wordmark ── */
  /* Flutter: staggered FadeTransition + SlideTransition per Text widget in a Row */
  .wordmark {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 900;
    font-size: 40px;
    letter-spacing: -0.03em;
    color: #0F1B35;
    line-height: 1;
    display: flex;
    overflow: hidden;
  }
  .wordmark .letter {
    display: inline-block;
    opacity: 0;
    transform: translateY(18px);
    animation: letter-in 0.4s ease-out forwards;
  }

  /* ── Tagline typing cursor ── */
  /* Flutter: Timer-based setState to build a String character by character */
  #tagline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #535e7b;
    min-height: 16px;
  }
  #tagline::after {
    content: '|';
    opacity: 1;
    animation: blink 0.8s step-end infinite;
    margin-left: 1px;
  }
  #tagline.done::after { display: none; }
  @keyframes blink {
    50% { opacity: 0; }
  }

  /* ── Progress bar + shimmer ── */
  /* Flutter: TweenAnimationBuilder for width; CustomPainter for shimmer overlay */
  .progress-track {
    width: 160px;
    height: 2px;
    background: #e2e2e4;
    border-radius: 9999px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: #FF3B5C;
    border-radius: 9999px;
    position: relative;
    transition: width 0.15s linear;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    top: 0; right: -40px;
    width: 40px; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    animation: shimmer 1s linear infinite;
  }
  @keyframes shimmer {
    0%   { transform: translateX(-40px); }
    100% { transform: translateX(200px); }
  }

  /* ── Button slide-up reveal ── */
  /* Flutter: SlideTransition(position: Tween(Offset(0,1), Offset(0,0))) + FadeTransition */
  .btn-wrap {
    width: 100%;
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.5s ease-out, transform 0.5s cubic-bezier(0.34, 1.4, 0.64, 1);
  }
  .btn-wrap.revealed {
    opacity: 1;
    transform: translateY(0);
  }
  .cta-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 56px;
    border-radius: 9999px;
    background: linear-gradient(135deg, #FF3B5C 0%, #BA0035 100%);
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 500;
    text-decoration: none;
    box-shadow: 0 8px 24px rgba(255,59,92,0.28);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .cta-btn:active { transform: scale(0.97); box-shadow: 0 4px 10px rgba(15,27,53,0.2); }

  /* ── Fade-up utility ── */
  @keyframes letter-in {
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up {
    opacity: 0;
    transform: translateY(10px);
    animation: fade-up-in 0.5s ease-out forwards;
  }
  @keyframes fade-up-in {
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body class="flex items-center justify-center min-h-screen">
<div class="phone">

  <!-- Glow blob (behind everything) -->
  <div class="glow-blob"></div>

  <!-- Spacer top -->
  <div></div>

  <!-- Branding cluster: logo + wordmark + tagline -->
  <div style="display:flex; flex-direction:column; align-items:center; gap:14px; text-align:center; position:relative; z-index:2;">
    <div class="logo-mark"><span>IZ</span></div>

    <!-- Letter-by-letter wordmark — delays set by JS below -->
    <div class="wordmark" id="wordmark"></div>

    <!-- Typing tagline -->
    <p id="tagline"></p>
  </div>

  <!-- Bottom: progress + loading label + button + footer -->
  <div style="display:flex; flex-direction:column; align-items:center; gap:20px; width:100%; position:relative; z-index:2;">

    <!-- Progress + label -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;" class="fade-up" style="animation-delay:1.2s;">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <p id="loading-label"
         style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:rgba(83,94,123,0.5); min-height:14px;">
      </p>
    </div>

    <!-- CTA button (hidden until load done) -->
    <div class="btn-wrap" id="btn-wrap">
      <a href="onboarding_1.html" class="cta-btn">Get Moving</a>
    </div>

    <!-- Footer -->
    <p style="font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:rgba(83,94,123,0.3);">
      Designed for Momentum &nbsp;·&nbsp; V1.0.0
    </p>
  </div>

</div>

<script>
  /* ── 1. Letter-by-letter wordmark ── */
  const letters = 'IZUKE'.split('');
  const wordmarkEl = document.getElementById('wordmark');
  letters.forEach((ch, i) => {
    const span = document.createElement('span');
    span.className = 'letter';
    span.textContent = ch;
    span.style.animationDelay = (0.75 + i * 0.07) + 's';
    wordmarkEl.appendChild(span);
  });

  /* ── 2. Tagline typing effect ── */
  const taglineText = 'Find Your Pace. Find Your Person.';
  const taglineEl = document.getElementById('tagline');
  let charIndex = 0;
  const startTyping = () => {
    if (charIndex < taglineText.length) {
      taglineEl.textContent = taglineText.slice(0, ++charIndex);
      setTimeout(startTyping, 38);
    } else {
      taglineEl.classList.add('done'); // removes blinking cursor
    }
  };
  setTimeout(startTyping, 1150); // starts after wordmark finishes

  /* ── 3. Loading label cycling ── */
  const labels = ['Lacing up…', 'Finding your pace…', 'Ready'];
  const labelEl = document.getElementById('loading-label');
  const labelTimings = [1400, 1950, 2500];
  labels.forEach((text, i) => {
    setTimeout(() => {
      labelEl.style.opacity = '0';
      labelEl.style.transition = 'opacity 0.2s';
      setTimeout(() => {
        labelEl.textContent = text;
        labelEl.style.opacity = '1';
      }, 220);
    }, labelTimings[i]);
  });

  /* ── 4. Progress bar fill (stepped) ── */
  const fill = document.getElementById('progress-fill');
  const steps = [
    { pct: '35%',  delay: 1400 },
    { pct: '65%',  delay: 1950 },
    { pct: '100%', delay: 2500 },
  ];
  steps.forEach(({ pct, delay }) => {
    setTimeout(() => { fill.style.width = pct; }, delay);
  });

  /* ── 5. Reveal CTA button after load complete ── */
  setTimeout(() => {
    document.getElementById('btn-wrap').classList.add('revealed');
  }, 2800);
</script>
  <script src="_nav.js"></script>
</body>
</html>
