<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Izuke — Rate your run</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #d9dadc; font-family: 'Inter', sans-serif; }
  .phone { width: 390px; height: 844px; background: #F5F5F7; position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 32px 80px rgba(0,0,0,0.18); border-radius: 48px; }

  .nav-bar { height: 56px; display: flex; align-items: center; padding: 8px 12px 0; flex-shrink: 0; position: relative; }
  .nav-ico { width: 38px; height: 38px; border-radius: 50%; background: #fff; border: 1px solid #e8e8ea; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #0F1B35; }
  .nav-title { position: absolute; left: 50%; transform: translate(-50%,5px); font-family: 'Hanken Grotesk', sans-serif; font-weight: 700; font-size: 18px; color: #0F1B35; }
  .step-dots { position: absolute; right: 16px; top: 22px; display: flex; gap: 5px; }
  .step-dots .d { width: 7px; height: 7px; border-radius: 50%; background: #d7dbe2; }
  .step-dots .d.on { background: #FF3B5C; }

  .scroll-body { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 8px 22px 20px; }
  .scroll-body::-webkit-scrollbar { display: none; }

  /* partner header */
  .who { display: flex; flex-direction: column; align-items: center; text-align: center; margin: 8px 0 6px; }
  .who .av { width: 84px; height: 84px; border-radius: 50%; object-fit: cover; border: 3px solid #fff; box-shadow: 0 8px 22px rgba(15,27,53,0.16); }
  .who h2 { font-family: 'Hanken Grotesk', sans-serif; font-weight: 800; font-size: 22px; color: #0F1B35; margin-top: 12px; }
  .who .run-meta { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; color: #777e90; margin-top: 6px; background: #fff; border: 1px solid #e8e8ea; padding: 6px 12px; border-radius: 9999px; }
  .who .run-meta .sep { color: #c7ccd6; }

  /* stars */
  .prompt { text-align: center; font-family: 'Hanken Grotesk', sans-serif; font-weight: 700; font-size: 16px; color: #2b3550; margin: 24px 0 14px; }
  .stars { display: flex; justify-content: center; gap: 10px; }
  .stars .material-symbols-outlined { font-size: 42px; color: #e2e5ec; cursor: pointer; transition: transform 0.1s, color 0.12s; }
  .stars .material-symbols-outlined:active { transform: scale(0.88); }
  .stars .material-symbols-outlined.on { color: #FF3B5C; font-variation-settings: 'FILL' 1; }
  .rate-word { text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #FF3B5C; min-height: 16px; margin-top: 12px; }

  /* tags */
  .sec-title { display: flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #8a91a0; margin: 26px 0 12px; }
  .sec-title .material-symbols-outlined { font-size: 16px; color: #FF3B5C; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { padding: 9px 14px; border-radius: 9999px; background: #fff; border: 1.5px solid #e8e8ea; font-size: 13px; font-weight: 600; color: #535e7b; cursor: pointer; }
  .chip.on { background: #FF3B5C; border-color: #FF3B5C; color: #fff; }

  /* progressive disclosure — revealed once a rating is given */
  .reveal { display: none; }
  .reveal.show { display: block; animation: fadeUp 0.32s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  /* elevated safety question */
  .safety-q { background: #fff; border: 1px solid #e8e8ea; border-radius: 16px; padding: 16px; margin-top: 26px; }
  .sq-head { display: flex; align-items: center; gap: 7px; font-family: 'Hanken Grotesk', sans-serif; font-weight: 700; font-size: 15px; color: #2b3550; margin-bottom: 12px; }
  .sq-head .material-symbols-outlined { font-size: 18px; color: #FF3B5C; }
  .safety-toggle { display: flex; gap: 10px; }
  .safety-toggle button { flex: 1; height: 44px; border-radius: 12px; border: 1.5px solid #e8e8ea; background: #fff; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; color: #535e7b; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.12s; }
  .safety-toggle button .material-symbols-outlined { font-size: 18px; }
  .safety-toggle button.yes.on { background: #15a34a; border-color: #15a34a; color: #fff; }
  .safety-toggle button.no.on { background: #ef4444; border-color: #ef4444; color: #fff; }

  .note-area { width: 100%; min-height: 84px; resize: none; margin-top: 18px; padding: 13px 15px; border-radius: 14px; border: 1.5px solid #e8e8ea; background: #fff; font-family: 'Inter', sans-serif; font-size: 14px; color: #0F1B35; outline: none; line-height: 1.5; }
  .note-area:focus { border-color: #FF3B5C; }
  .note-area::placeholder { color: #b6bcc9; }

  .privacy { display: flex; align-items: center; gap: 6px; justify-content: center; font-size: 12px; color: #8a91a0; margin-top: 16px; }
  .privacy .material-symbols-outlined { font-size: 15px; }

  .footer { flex-shrink: 0; padding: 12px 22px 30px; }
  .btn { width: 100%; height: 54px; border: none; cursor: pointer; border-radius: 9999px; background: linear-gradient(135deg,#FF3B5C,#BA0035); color: #fff; font-family: 'Inter', sans-serif; font-weight: 500; font-size: 16px; box-shadow: 0 10px 24px rgba(255,59,92,0.30); display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn[disabled] { background: #e2e5ec; color: #b6bcc9; box-shadow: none; cursor: not-allowed; }
  .btn .material-symbols-outlined { font-size: 20px; }

  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; }
  .filled { font-variation-settings: 'FILL' 1; }
</style>
</head>
<body style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
<div class="phone">
  <div class="nav-bar">
    <button class="nav-ico" onclick="window.location.href='chat.html'"><span class="material-symbols-outlined">close</span></button>
    <span class="nav-title">Rate your run</span>
    <div class="step-dots"><span class="d on"></span><span class="d"></span></div>
  </div>

  <div class="scroll-body">
    <div class="who">
      <img class="av" src="https://i.pravatar.cc/160?img=11">
      <h2>Alex Carter</h2>
      <span class="run-meta">Sat, May 31<span class="sep">·</span>5 km<span class="sep">·</span>Prospect Park</span>
    </div>

    <div class="prompt">How was running with Alex?</div>
    <div class="stars" id="stars">
      <span class="material-symbols-outlined" onclick="setStars(1)">star</span>
      <span class="material-symbols-outlined" onclick="setStars(2)">star</span>
      <span class="material-symbols-outlined" onclick="setStars(3)">star</span>
      <span class="material-symbols-outlined" onclick="setStars(4)">star</span>
      <span class="material-symbols-outlined" onclick="setStars(5)">star</span>
    </div>
    <div class="rate-word" id="rateWord"></div>

    <div class="reveal" id="reveal">
      <!-- elevated safety signal -->
      <div class="safety-q">
        <div class="sq-head"><span class="material-symbols-outlined filled">shield</span>Did you feel safe with Alex?</div>
        <div class="safety-toggle">
          <button class="yes" onclick="setSafe(this)"><span class="material-symbols-outlined">check</span>Yes</button>
          <button class="no" onclick="setSafe(this)"><span class="material-symbols-outlined">close</span>No</button>
        </div>
      </div>

      <!-- rating-aware tags -->
      <div class="sec-title"><span class="material-symbols-outlined filled">sentiment_satisfied</span><span id="tagsLabel">What stood out?</span></div>
      <div class="chips" id="tags"></div>

      <textarea class="note-area" placeholder="Add a note (optional)…"></textarea>

      <div class="privacy"><span class="material-symbols-outlined">lock</span>Private until you both rate</div>
    </div>
  </div>

  <div class="footer">
    <button class="btn" id="continueBtn" disabled onclick="prComplete('partner')">Continue<span class="material-symbols-outlined">arrow_forward</span></button>
  </div>
</div>
<script>
  const WORDS = { 1: 'Poor', 2: 'Okay', 3: 'Good', 4: 'Great', 5: 'Excellent' };
  const POS = ['Punctual', 'Great pace', 'Motivating', 'Friendly', 'Would run again'];
  const NEG = ['Different pace', 'Showed up late', 'Hard to keep up', 'No-show', 'Cancelled last-minute'];
  let rating = 0;
  function setStars(n) {
    rating = n;
    document.querySelectorAll('#stars .material-symbols-outlined').forEach((s, i) => s.classList.toggle('on', i < n));
    document.getElementById('rateWord').textContent = WORDS[n] || '';
    document.getElementById('continueBtn').disabled = n === 0;

    // rating-aware tags
    const positive = n >= 4;
    document.getElementById('tagsLabel').textContent = positive ? 'What stood out?' : 'What could be better?';
    const tags = positive ? POS : NEG;
    document.getElementById('tags').innerHTML =
      tags.map(t => '<div class="chip" onclick="this.classList.toggle(\'on\')">' + t + '</div>').join('');

    // reveal the rest once a rating exists
    document.getElementById('reveal').classList.add('show');
  }
  function setSafe(btn) {
    btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
  }

  /* mark this post-run step done, then continue to the next pending step (forward only) */
  function prComplete(step) {
    localStorage.setItem('pr_' + step, '1');
    const map = { moment: 'create_moment.html', partner: 'rate_partner.html', route: 'rate_route.html' };
    const order = ['moment', 'partner', 'route'];
    const next = order.slice(order.indexOf(step) + 1).find(s => localStorage.getItem('pr_' + s) !== '1');
    window.location.href = next ? map[next] : 'chat.html';
  }
</script>
<script src="_nav.js"></script>
</body>
</html>
