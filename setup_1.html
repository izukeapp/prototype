<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Izuke – Your Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@700;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #d9dadc; font-family: 'Inter', sans-serif; }

  .phone {
    width: 390px;
    height: 844px;
    background: #F5F5F7;
    position: relative;
    display: flex;
    flex-direction: column;
    box-shadow: 0 32px 80px rgba(0,0,0,0.18);
    border-radius: 48px;
    overflow: hidden;
  }

  /* Nav bar */
  .nav-bar {
    height: 56px;
    display: flex; align-items: center;
    padding: 0 16px;
    background: #F5F5F7;
    flex-shrink: 0;
    position: relative;
  }
  .nav-back {
    width: 36px; height: 36px;
    border-radius: 50%; background: #ebebed;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border: none; color: #1a1c1d;
  }
  .nav-title {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 800; font-size: 17px; color: #0F1B35;
  }

  /* Progress bar */
  .progress-track {
    height: 4px; background: #e2e2e4; flex-shrink: 0;
  }
  .progress-fill {
    height: 100%; width: 20%;
    background: linear-gradient(90deg, #FF3B5C, #BA0035);
    border-radius: 0 4px 4px 0;
    transition: width 0.4s ease;
  }

  /* Scrollable content */
  .scroll-body {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 24px 24px 0;
    -webkit-overflow-scrolling: touch;
  }
  .scroll-body::-webkit-scrollbar { display: none; }

  /* Avatar */
  .avatar-wrap {
    position: relative; width: 100px; height: 100px;
    margin: 36px auto 44px;
    cursor: pointer;
  }
  .avatar-circle {
    width: 100px; height: 100px; border-radius: 50%;
    background: linear-gradient(135deg, #FF3B5C, #BA0035);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(255,59,92,0.30);
    overflow: hidden;
  }
  .avatar-circle span {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 900; font-size: 40px; color: #fff;
  }
  .avatar-circle img {
    width: 100%; height: 100%; object-fit: cover; display: none;
  }
  .camera-badge {
    position: absolute; bottom: 2px; right: 2px;
    width: 32px; height: 32px; border-radius: 50%;
    background: #fff; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    border: 2px solid #F5F5F7;
  }

  /* Field label */
  .field-label {
    font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 600; color: #0F1B35;
    margin-bottom: 8px; display: block;
  }
  .field-label.optional { color: #535e7b; }
  .field-label .opt {
    font-weight: 400; color: #999; font-size: 14px;
  }

  /* Inputs */
  .input-field {
    width: 100%;
    background: #fff;
    border: none;
    border-radius: 16px;
    padding: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 15px; color: #0F1B35;
    outline: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    transition: box-shadow 0.2s;
    resize: none;
  }
  .input-field::placeholder { color: #bbb; }
  .input-field:focus {
    box-shadow: 0 0 0 2px #FF3B5C, 0 1px 4px rgba(0,0,0,0.06);
  }

  /* Sticky footer */
  .footer {
    padding: 16px 24px 36px;
    background: #F5F5F7;
    flex-shrink: 0;
  }
  .btn-continue {
    width: 100%; height: 56px;
    border: none; border-radius: 9999px;
    background: linear-gradient(135deg, #FF3B5C 0%, #BA0035 100%);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-weight: 500; font-size: 16px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(255,59,92,0.28);
    transition: transform 0.15s;
  }
  .btn-continue:active { transform: scale(0.97); }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
</style>
</head>

<body style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
<div class="phone">

  <!-- Status bar -->
  <div style="height:48px; display:flex; align-items:center; padding:0 24px; flex-shrink:0;">
    <span style="font-family:'Hanken Grotesk',sans-serif; font-weight:700; font-size:15px; color:#0F1B35;">9:41</span>
  </div>

  <!-- Nav bar -->
  <div class="nav-bar">
    <button class="nav-back" onclick="window.location.href='auth.html'">
      <span class="material-symbols-outlined" style="font-size:20px; font-variation-settings:'FILL' 0,'wght' 400;">chevron_left</span>
    </button>
    <span class="nav-title">Your Profile</span>
  </div>

  <!-- Progress bar -->
  <div class="progress-track">
    <div class="progress-fill"></div>
  </div>

  <!-- Scrollable content -->
  <div class="scroll-body">

    <!-- Step label -->
    <p style="font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:#535e7b; margin-bottom:6px;">
      Step 1 of 5
    </p>

    <!-- Headline -->
    <h1 style="font-family:'Hanken Grotesk',sans-serif; font-weight:900; font-size:26px; color:#2d3748; line-height:1.2;">
      Let's set up your profile
    </h1>

    <!-- Avatar uploader -->
    <div class="avatar-wrap" onclick="document.getElementById('avatar-input').click()">
      <div class="avatar-circle" id="avatar-circle">
        <span id="avatar-initial">C</span>
        <img id="avatar-preview" alt="avatar">
      </div>
      <div class="camera-badge">
        <span class="material-symbols-outlined" style="font-size:16px; color:#535e7b;">photo_camera</span>
      </div>
    </div>
    <input type="file" id="avatar-input" accept="image/*" style="display:none;" onchange="previewAvatar(this)">

    <!-- Full Name -->
    <div style="margin-bottom:20px;">
      <label class="field-label">Full Name</label>
      <input class="input-field" type="text" placeholder="Enter your full name" id="name-input" oninput="updateInitial()">
    </div>

    <!-- Bio -->
    <div style="margin-bottom:20px;">
      <label class="field-label">Bio <span class="opt">(optional)</span></label>
      <textarea class="input-field" rows="4" placeholder="Tell runners a bit about yourself..." maxlength="160"></textarea>
    </div>

    <!-- Character hint -->
    <p style="font-family:'JetBrains Mono',monospace; font-size:10px; color:#bbb; letter-spacing:0.08em; text-align:right; margin-top:-12px; margin-bottom:24px;">
      160 chars max
    </p>

  </div>

  <!-- Sticky footer -->
  <div class="footer">
    <button class="btn-continue" onclick="window.location.href='setup_2.html'">
      Continue
    </button>
  </div>

</div>

<script>
  function updateInitial() {
    const name = document.getElementById('name-input').value.trim();
    const initial = name ? name[0].toUpperCase() : 'C';
    document.getElementById('avatar-initial').textContent = initial;
  }

  function previewAvatar(input) {
    if (!input.files || !input.files[0]) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('avatar-preview');
      img.src = e.target.result;
      img.style.display = 'block';
      document.getElementById('avatar-initial').style.display = 'none';
    };
    reader.readAsDataURL(input.files[0]);
  }
</script>
</body>
</html>
