<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Izuke — Create Route</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #d9dadc; font-family: 'Inter', sans-serif; }
  .phone { width: 390px; height: 844px; background: #F5F5F7; position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 32px 80px rgba(0,0,0,0.18); border-radius: 48px; }

  .nav-bar { height: 56px; display: flex; align-items: center; padding: 0 12px; background: #fff; border-bottom: 1px solid rgba(0,0,0,0.06); flex-shrink: 0; position: relative; padding-top: 8px; }
  .nav-back { width: 38px; height: 38px; border-radius: 50%; background: #F5F5F7; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .nav-title { position: absolute; left: 50%; transform: translateX(-50%); top: 50%; margin-top: 4px; transform: translate(-50%,-50%); font-family: 'Hanken Grotesk'; font-weight: 700; font-size: 18px; color: #0F1B35; }

  /* trace map */
  .map { position: relative; height: 300px; flex-shrink: 0; background:
      linear-gradient(0deg, rgba(15,27,53,0.05) 1px, transparent 1px) 0 0 / 100% 30px,
      linear-gradient(90deg, rgba(15,27,53,0.05) 1px, transparent 1px) 0 0 / 30px 100%, #e9edf0; }
  .map .road { position: absolute; background: #fff; }
  .map .road.h { height: 14px; left:-10px; right:-10px; } .map .road.v { width: 14px; top:-10px; bottom:-10px; }
  .poly { position: absolute; top: 70px; left: 70px; width: 200px; height: 150px;
    background: rgba(255,59,92,0.16); border: 2.5px dashed #FF3B5C; border-radius: 44% 56% 52% 48% / 54% 46% 54% 46%; }
  .vertex { position: absolute; width: 14px; height: 14px; border-radius: 50%; background: #fff; border: 3px solid #FF3B5C; transform: translate(-50%,-50%); box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
  .map-hint { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(15,27,53,0.9); color: #fff; font-size: 12px; font-weight: 600; padding: 8px 14px; border-radius: 9999px; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px; }
  .map-hint .material-symbols-outlined { font-size: 16px; }

  .form { flex: 1; overflow-y: auto; padding: 20px; }
  .form::-webkit-scrollbar { display: none; }
  .field { margin-bottom: 20px; }
  .field label { display: flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono'; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #8a91a0; margin-bottom: 8px; }
  .field label .material-symbols-outlined { font-size: 16px; color: #FF3B5C; }
  .field input { width: 100%; height: 50px; padding: 0 16px; border-radius: 14px; border: 1.5px solid #e8e8ea; background: #fff; font-family: 'Inter'; font-size: 15px; color: #0F1B35; outline: none; }
  .field input:focus { border-color: #FF3B5C; }
  .auto-note { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #999; margin-top: 6px; }
  .auto-note .material-symbols-outlined { font-size: 15px; }

  .chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { padding: 10px 16px; border-radius: 9999px; background: #fff; border: 1.5px solid #e8e8ea; font-size: 14px; font-weight: 600; color: #535e7b; cursor: pointer; }
  .chip.active { background: #FF3B5C; border-color: #FF3B5C; color: #fff; }

  .save { position: absolute; left: 20px; right: 20px; bottom: 24px; height: 54px; border: none; cursor: pointer; border-radius: 9999px; background: linear-gradient(135deg,#FF3B5C,#BA0035); color: #fff; font-family: 'Inter'; font-weight: 700; font-size: 16px; box-shadow: 0 10px 24px rgba(255,59,92,0.36); display: flex; align-items: center; justify-content: center; gap: 8px; }
  .save .material-symbols-outlined { font-size: 21px; }

  /* map zoom controls */
  .zoom-ctrl { position: absolute; top: 14px; right: 14px; display: flex; flex-direction: column; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 12px rgba(15,27,53,0.16); }
  .zoom-ctrl button { width: 42px; height: 42px; border: none; background: #fff; cursor: pointer; color: #0F1B35; display: flex; align-items: center; justify-content: center; }
  .zoom-ctrl button:active { background: #f0f1f4; }
  .zoom-ctrl button:first-child { border-bottom: 1px solid #eceef2; }
  .zoom-ctrl button .material-symbols-outlined { font-size: 22px; }
  .loc-btn { position: absolute; top: 108px; right: 14px; width: 42px; height: 42px; border-radius: 12px; border: none; background: #fff; cursor: pointer; color: #FF3B5C; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(15,27,53,0.16); }

  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; }
</style>
</head>
<body style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
<div class="phone">

  <div class="nav-bar">
    <button class="nav-back" onclick="window.location.href='routes.html'"><span class="material-symbols-outlined">arrow_back</span></button>
    <span class="nav-title">New route</span>
  </div>

  <!-- Trace map -->
  <div class="map">
    <div class="road h" style="top:120px;"></div>
    <div class="road v" style="left:150px;"></div>
    <div class="poly"></div>
    <div class="vertex" style="top:70px;left:70px;"></div>
    <div class="vertex" style="top:70px;left:270px;"></div>
    <div class="vertex" style="top:220px;left:270px;"></div>
    <div class="vertex" style="top:220px;left:70px;"></div>
    <div class="zoom-ctrl">
      <button><span class="material-symbols-outlined">add</span></button>
      <button><span class="material-symbols-outlined">remove</span></button>
    </div>
    <button class="loc-btn"><span class="material-symbols-outlined">my_location</span></button>
    <div class="map-hint"><span class="material-symbols-outlined">touch_app</span> Tap to add points · drag to adjust the area</div>
  </div>

  <div class="form">
    <div class="field">
      <label><span class="material-symbols-outlined filled">route</span>Route name</label>
      <input type="text" placeholder="e.g. Tao Dan Park Loop" value="Tao Dan Park Loop">
      <div class="auto-note"><span class="material-symbols-outlined">my_location</span> District 1, Ho Chi Minh City · auto-detected</div>
    </div>

    <div class="field">
      <label><span class="material-symbols-outlined filled">straighten</span>Distance</label>
      <div class="chips">
        <div class="chip active">5K</div>
        <div class="chip">10K</div>
        <div class="chip">21K</div>
        <div class="chip">42K</div>
      </div>
    </div>

    <div class="field">
      <label><span class="material-symbols-outlined filled">terrain</span>Surface</label>
      <div class="chips">
        <div class="chip active">Paved</div>
        <div class="chip">Mixed</div>
        <div class="chip">Trail</div>
      </div>
    </div>
  </div>

  <button class="save" onclick="window.location.href='route_detail.html'"><span class="material-symbols-outlined">check</span>Save route</button>
</div>
<script src="_nav.js"></script>
</body>
</html>
