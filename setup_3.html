<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Izuke – Run Preferences</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #d9dadc; font-family: 'Inter', sans-serif; }

  .phone {
    width: 390px;
    height: 844px;
    background: #ffffff;
    position: relative;
    display: flex;
    flex-direction: column;
    box-shadow: 0 32px 80px rgba(0,0,0,0.18);
    border-radius: 48px;
    overflow: hidden;
  }

  /* Nav bar */
  .nav-bar {
    height: 56px;
    display: flex; align-items: center;
    padding: 0 20px;
    background: #fff;
    flex-shrink: 0;
    position: relative;
  }
  .nav-back {
    width: 36px; height: 36px;
    border-radius: 50%; background: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border: none; color: #1a1c1d;
  }
  .nav-title {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 800; font-size: 17px; color: #0F1B35;
  }

  /* Progress bar */
  .progress-track { height: 3px; background: #e2e2e4; flex-shrink: 0; }
  .progress-fill {
    height: 100%; width: 60%;
    background: linear-gradient(90deg, #FF3B5C, #BA0035);
  }

  /* Scrollable content */
  .scroll-body {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 24px 24px 100px;
    -webkit-overflow-scrolling: touch;
  }
  .scroll-body::-webkit-scrollbar { display: none; }

  /* Section label */
  .section-label {
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600;
    color: #535e7b; margin-bottom: 14px;
  }

  /* Divider */
  .divider {
    height: 1px; background: #f0f0f2;
    margin: 20px 0;
  }

  /* Run type chips — wrapping flex */
  .chip-wrap {
    display: flex; flex-wrap: wrap; gap: 10px;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    height: 40px; padding: 0 16px;
    border-radius: 9999px;
    border: 1.5px solid transparent;
    background: #f2f2f4;
    font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 600;
    color: #535e7b;
    cursor: pointer;
    transition: all 0.18s;
    user-select: none;
  }
  .chip.sm {
    font-size: 12px; padding: 0 12px; height: 36px;
  }
  .chip:active { transform: scale(0.95); }
  .chip.selected {
    background: rgba(255,59,92,0.08);
    border-color: #FF3B5C;
    color: #FF3B5C;
  }
  .chip .material-symbols-outlined { font-size: 16px; }

  /* Distance unit toggle row */
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
  }
  .toggle-row .label-stack .top {
    font-size: 13px; color: #999; font-weight: 400;
  }
  .toggle-row .label-stack .bottom {
    font-size: 13px; color: #535e7b; font-weight: 600;
    margin-top: 2px;
  }
  /* iOS-style toggle */
  .ios-toggle {
    position: relative; width: 51px; height: 31px;
    cursor: pointer;
  }
  .ios-toggle input { opacity: 0; width: 0; height: 0; }
  .ios-toggle .track {
    position: absolute; inset: 0;
    background: #e2e2e4; border-radius: 9999px;
    transition: background 0.2s;
  }
  .ios-toggle input:checked + .track { background: #FF3B5C; }
  .ios-toggle .thumb {
    position: absolute;
    top: 2px; left: 2px;
    width: 27px; height: 27px;
    background: #fff; border-radius: 50%;
    box-shadow: 0 1px 4px rgba(0,0,0,0.22);
    transition: transform 0.2s;
  }
  .ios-toggle input:checked ~ .thumb { transform: translateX(20px); }

  /* Pace row */
  .pace-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .pace-row .label {
    font-size: 13px; font-weight: 600; color: #535e7b;
  }
  .pace-row .value {
    font-family: 'Inter', sans-serif;
    font-size: 16px; font-weight: 600; color: #535e7b;
  }
  .pace-row .value span {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 800; font-size: 18px; color: #0F1B35;
  }

  /* Pace slider */
  .pace-slider {
    width: 100%; height: 4px;
    border-radius: 2px;
    background: #e2e2e4;
    outline: none;
    appearance: none; -webkit-appearance: none;
    cursor: pointer;
  }
  .pace-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    background: #FF3B5C;
    border: 3px solid #fff;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.20);
  }
  .pace-slider::-moz-range-thumb {
    width: 22px; height: 22px;
    background: #FF3B5C;
    border: 3px solid #fff;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.20);
  }

  /* Segmented distance control */
  .segment-control {
    display: flex;
    background: #f2f2f4;
    border-radius: 14px;
    padding: 4px;
    gap: 2px;
  }
  .segment-btn {
    flex: 1; height: 44px;
    border: none; border-radius: 10px;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 600;
    color: #999;
    cursor: pointer;
    transition: all 0.18s;
  }
  .segment-btn:active { transform: scale(0.96); }
  .segment-btn.active {
    background: #fff;
    color: #0F1B35;
    box-shadow: 0 1px 6px rgba(0,0,0,0.10);
    font-weight: 700;
  }

  /* Sticky footer */
  .footer {
    padding: 16px 24px 36px;
    background: linear-gradient(to top, #fff 80%, transparent);
    position: absolute;
    bottom: 0; left: 0; right: 0;
    pointer-events: none;
  }
  .btn-continue {
    width: 100%; height: 56px;
    border: none; border-radius: 9999px;
    background: linear-gradient(135deg, #FF3B5C 0%, #BA0035 100%);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-weight: 500; font-size: 16px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(255,59,92,0.28);
    transition: transform 0.15s;
    pointer-events: all;
  }
  .btn-continue:active { transform: scale(0.97); }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
  }
</style>
</head>

<body style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
<div class="phone">

  <!-- Status bar -->
  <div style="height:48px; display:flex; align-items:center; padding:0 24px; flex-shrink:0;">
    <span style="font-family:'Hanken Grotesk',sans-serif; font-weight:700; font-size:15px; color:#0F1B35;">9:41</span>
  </div>

  <!-- Nav bar -->
  <div class="nav-bar">
    <button class="nav-back" onclick="window.location.href='setup_2.html'">
      <span class="material-symbols-outlined" style="font-size:24px;">arrow_back</span>
    </button>
    <span class="nav-title">Run Preferences</span>
  </div>

  <!-- Progress bar -->
  <div class="progress-track">
    <div class="progress-fill"></div>
  </div>

  <!-- Scrollable content -->
  <div class="scroll-body">

    <!-- Run type -->
    <p class="section-label">Run type</p>
    <div class="chip-wrap">
      <button class="chip sm selected" onclick="toggleChip(this)">
        <span class="material-symbols-outlined">directions_run</span> Road
      </button>
      <button class="chip sm" onclick="toggleChip(this)">
        <span class="material-symbols-outlined">landscape</span> Trail
      </button>
      <button class="chip sm selected" onclick="toggleChip(this)">
        <span class="material-symbols-outlined">track_changes</span> Track
      </button>
      <button class="chip sm" onclick="toggleChip(this)">
        <span class="material-symbols-outlined">bolt</span> Ultra
      </button>
    </div>

    <div class="divider"></div>

    <!-- Distance unit -->
    <div class="toggle-row">
      <div class="label-stack">
        <div class="top">Distance Unit</div>
        <div class="bottom">Miles</div>
      </div>
      <label class="ios-toggle">
        <input type="checkbox" onchange="updateUnit(this)">
        <div class="track"></div>
        <div class="thumb"></div>
      </label>
    </div>

    <div class="divider"></div>

    <!-- Typical pace -->
    <div class="pace-row">
      <span class="label">Typical pace</span>
      <span class="value"><span id="pace-display">8:00</span> /mi</span>
    </div>
    <input class="pace-slider" id="pace-slider" type="range" min="300" max="720" step="5" value="480" oninput="updatePace(this.value)">

    <div class="divider"></div>

    <!-- Typical distance -->
    <p class="section-label">Typical Distance</p>
    <div class="segment-control">
      <button class="segment-btn active" onclick="selectSegment(this)">5K</button>
      <button class="segment-btn" onclick="selectSegment(this)">10K</button>
      <button class="segment-btn" onclick="selectSegment(this)">Half</button>
      <button class="segment-btn" onclick="selectSegment(this)">Full</button>
    </div>

    <div class="divider"></div>

    <!-- Availability -->
    <p class="section-label">Availability</p>
    <div class="chip-wrap">
      <button class="chip sm selected" onclick="toggleChip(this)">Early Morning</button>
      <button class="chip sm" onclick="toggleChip(this)">Morning</button>
      <button class="chip sm" onclick="toggleChip(this)">Afternoon</button>
      <button class="chip sm" onclick="toggleChip(this)">Evening</button>
    </div>

  </div>

  <!-- Sticky footer -->
  <div class="footer">
    <button class="btn-continue" onclick="window.location.href='setup_4.html'">Continue</button>
  </div>

</div>

<script>
  /* Run type / Availability — multi-select toggle */
  function toggleChip(el) {
    el.classList.toggle('selected');
  }

  /* Pace slider → MM:SS */
  function updatePace(seconds) {
    const s = parseInt(seconds);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    document.getElementById('pace-display').textContent = m + ':' + String(sec).padStart(2, '0');
  }

  /* Distance unit toggle label */
  function updateUnit(cb) {
    cb.closest('.toggle-row').querySelector('.bottom').textContent = cb.checked ? 'Kilometers' : 'Miles';
  }

  /* Segmented control — single select */
  function selectSegment(el) {
    el.closest('.segment-control').querySelectorAll('.segment-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }
</script>
</body>
</html>
