<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Izuke – Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #d9dadc; font-family: 'Inter', sans-serif; }

  .phone {
    width: 390px;
    height: 844px;
    background: #fff;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 32px 80px rgba(0,0,0,0.18);
    border-radius: 48px;
  }

  .fade-up {
    opacity: 0; transform: translateY(14px);
    animation: fade-up 0.5s ease-out forwards;
  }
  @keyframes fade-up { to { opacity: 1; transform: translateY(0); } }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
  }
  .filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  /* Nav bar */
  .nav-bar {
    height: 56px;
    display: flex; align-items: center;
    padding: 0 16px;
    flex-shrink: 0;
    position: relative;
  }
  .nav-back {
    width: 40px; height: 40px; border-radius: 50%;
    background: #F5F5F7; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #1a1c1d;
    transition: transform 0.1s;
  }
  .nav-back:active { transform: scale(0.92); }
  .nav-title {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 800; font-size: 17px; color: #0F1B35;
  }

  /* Content */
  .content {
    flex: 1;
    display: flex; flex-direction: column;
    padding: 12px 28px 32px;
  }

  .intro {
    margin-bottom: 24px; padding-bottom: 24px;
    border-bottom: 1px solid #f0f0f2;
  }
  .intro h1 {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 900; font-size: 30px; color: #0F1B35;
    letter-spacing: -0.02em; line-height: 1.1;
  }
  .intro p {
    font-size: 15px; color: #535e7b; margin-top: 8px; line-height: 1.5;
  }

  /* Tab toggle */
  .tab-toggle {
    display: flex; background: #F5F5F7;
    border-radius: 12px; padding: 4px; gap: 4px;
    margin-bottom: 24px;
  }
  .tab-toggle button {
    flex: 1; height: 42px; border: none; border-radius: 10px;
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.2s ease;
  }
  .tab-toggle button.active {
    background: #fff; color: #0F1B35; box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }
  .tab-toggle button.inactive { background: transparent; color: #999; }

  /* Inputs */
  .input-label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: #535e7b; margin-bottom: 8px;
  }
  .input-field {
    width: 100%; height: 52px;
    border: 1.5px solid #e2e2e4; border-radius: 14px;
    padding: 0 16px;
    font-family: 'Inter', sans-serif; font-size: 15px; color: #0F1B35;
    background: #fff; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-field:focus {
    border-color: #FF3B5C; box-shadow: 0 0 0 3px rgba(255,59,92,0.08);
  }
  .input-field::placeholder { color: #c0c0c8; }

  /* Primary button */
  .btn-primary {
    width: 100%; height: 56px; border: none; border-radius: 9999px;
    background: linear-gradient(135deg, #FF3B5C 0%, #BA0035 100%);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-weight: 500; font-size: 16px; cursor: pointer;
    box-shadow: 0 8px 24px rgba(255,59,92,0.28);
    transition: transform 0.15s ease;
  }
  .btn-primary:active { transform: scale(0.97); }

  /* Divider */
  .divider {
    display: flex; align-items: center; gap: 12px; margin: 20px 0;
  }
  .divider hr { flex: 1; border: none; border-top: 1px solid #e2e2e4; }
  .divider span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: #b0b0b8;
  }

  /* Social row */
  .social-row { display: flex; gap: 12px; }
  .social-btn {
    flex: 1; height: 52px;
    border: 1.5px solid #e2e2e4; border-radius: 14px;
    background: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s;
  }
  .social-btn:active { transform: scale(0.97); background: #f5f5f7; }
</style>
</head>

<body style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
<div class="phone">

  <!-- Status bar -->
  <div style="height:48px; display:flex; align-items:center; padding:0 24px; flex-shrink:0;">
    <span style="font-family:'Hanken Grotesk',sans-serif; font-weight:700; font-size:15px; color:#0F1B35;">9:41</span>
  </div>

  <!-- Nav bar -->
  <div class="nav-bar">
    <button class="nav-back" onclick="window.location.href='auth.html'">
      <span class="material-symbols-outlined" style="font-size:22px;">arrow_back</span>
    </button>
  </div>

  <!-- Content -->
  <div class="content fade-up">

    <!-- Intro -->
    <div class="intro">
      <h1 id="hero-title">Welcome back</h1>
      <p id="hero-sub">Sign in to find your next run match.</p>
    </div>

    <!-- Tab toggle -->
    <div class="tab-toggle">
      <button class="active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
      <button class="inactive" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Sign In form -->
    <div id="form-signin" style="display:flex; flex-direction:column; gap:16px;">
      <div>
        <label class="input-label">Email</label>
        <input class="input-field" type="email" placeholder="you@example.com">
      </div>
      <div>
        <label class="input-label">Password</label>
        <div style="position:relative;">
          <input class="input-field" type="password" placeholder="••••••••" id="pass-field" style="padding-right:48px;">
          <button onclick="togglePass()" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#999; display:flex; align-items:center;">
            <span class="material-symbols-outlined" id="pass-icon" style="font-size:20px;">visibility_off</span>
          </button>
        </div>
        <div style="text-align:right; margin-top:8px;">
          <span style="font-family:'Inter',sans-serif; font-size:13px; font-weight:700; color:#FF3B5C; cursor:pointer;">Forgot password?</span>
        </div>
      </div>
    </div>

    <!-- Sign Up form -->
    <div id="form-signup" style="display:none; flex-direction:column; gap:16px;">
      <div>
        <label class="input-label">Full Name</label>
        <input class="input-field" type="text" placeholder="Your name">
      </div>
      <div>
        <label class="input-label">Email</label>
        <input class="input-field" type="email" placeholder="you@example.com">
      </div>
      <div>
        <label class="input-label">Password</label>
        <input class="input-field" type="password" placeholder="••••••••">
      </div>
    </div>

    <!-- Spacer -->
    <div style="flex:1; min-height:24px;"></div>

    <!-- CTA -->
    <button class="btn-primary" id="cta-btn" onclick="window.location.href='setup_1.html'">Sign In</button>

    <!-- Social sign-in -->
    <div class="divider"><hr><span>or continue with</span><hr></div>
    <div class="social-row">
      <button class="social-btn" onclick="window.location.href='setup_1.html'">
        <svg width="22" height="22" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
      </button>
      <button class="social-btn" onclick="window.location.href='setup_1.html'">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#1a1c1d">
          <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2.044-.156-3.07 1.09-4.21 1.091zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.702z"/>
        </svg>
      </button>
      <button class="social-btn" onclick="window.location.href='setup_1.html'">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="#1877F2">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
      </button>
    </div>

  </div>

</div>

<script>
  function switchTab(tab) {
    const isSignin = tab === 'signin';
    document.getElementById('tab-signin').className = isSignin ? 'active' : 'inactive';
    document.getElementById('tab-signup').className = isSignin ? 'inactive' : 'active';
    document.getElementById('form-signin').style.display = isSignin ? 'flex' : 'none';
    document.getElementById('form-signup').style.display = isSignin ? 'none' : 'flex';
    document.getElementById('cta-btn').textContent = isSignin ? 'Sign In' : 'Create Account';
    document.getElementById('hero-title').textContent = isSignin ? 'Welcome back' : 'Join Izuke';
    document.getElementById('hero-sub').textContent = isSignin ? 'Sign in to find your next run match.' : 'Create an account to find your crew.';
  }

  function togglePass() {
    const f = document.getElementById('pass-field');
    const icon = document.getElementById('pass-icon');
    const isPass = f.type === 'password';
    f.type = isPass ? 'text' : 'password';
    icon.textContent = isPass ? 'visibility' : 'visibility_off';
  }
</script>
  <script src="_nav.js"></script>
</body>
</html>
