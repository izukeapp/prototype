<script>
        // Micro-interaction: Confetti generation
        const container = document.getElementById('confetti-container');
        const colors = ['#FF3B5C', '#0F1B35', '#006a43', '#FFDADA'];
        
        function createConfetti() {
            for(let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'confetti-particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                p.style.transform = `rotate(${Math.random() * 360}deg) scale(${Math.random() * 0.5 + 0.5})`;
                
                container.appendChild(p);

                // Simple drift animation
                const duration = 3000 + Math.random() * 3000;
                p.animate([
                    { transform: `translate(0,0) rotate(0deg)`, opacity: 0.6 },
                    { transform: `translate(${Math.random() * 100 - 50}px, ${Math.random() * 100 + 100}px) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], {
                    duration: duration,
                    easing: 'cubic-bezier(0,0,0.2,1)',
                    fill: 'forwards'
                });

                setTimeout(() => p.remove(), duration);
            }
        }

        // Trigger confetti on load
        window.addEventListener('load', () => {
            createConfetti();
            setInterval(createConfetti, 4000);
        });
    </script>
