<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-dot {
            width: 24px;
            height: 8px;
            border-radius: 4px;
            background-color: #FF3B5C;
            transition: all 0.3s ease;
        }
        .inactive-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #e2e2e4;
        }
        /* Kinetic Pulse effect for the background */
        .pulse-blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 59, 92, 0.05) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            filter: blur(40px);
            z-index: -1;
            animation: pulse-move 10s infinite alternate ease-in-out;
        }
        @keyframes pulse-move {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(10%, 10%) scale(1.2); }
        }
    </style>
