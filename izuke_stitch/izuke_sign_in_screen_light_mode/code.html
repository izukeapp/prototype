<style>

        }
        .velocity-gradient {
            background: linear-gradient(135deg, #FF3B5C 0%, #BA0035 100%);
        }
        .card-panel {
            background: #ffffff;
            border: 1px border-surface-variant;
            box-shadow: 0 4px 20px -2px rgba(15, 27, 53, 0.08);
        }
        .social-btn {
            background: #ffffff;
            border: 1px solid #e2e2e4;
            transition: all 0.3s ease;
        }
        .social-btn:hover {
            background: #f3f3f5;
            border-color: #d9dadc;
        }
        .input-field {
            background: #ffffff;
            border: 1px solid #e2e2e4;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-field:focus {
            border-color: #FF3B5C;
            background: #ffffff;
            box-shadow: 0 0 20px rgba(255, 59, 92, 0.05);
        }
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }

<body class="light-bg text-on-surface font-body-md overflow-x-hidden">
<main class="relative min-h-screen flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-12">
<!-- Branding -->
<div class="mb-10 flex flex-col items-center animate-in fade-in slide-in-from-top-4 duration-1000">
    <div class="relative group mb-6">
        <div class="absolute -inset-4 bg-velocity-pink/5 blur-3xl rounded-full opacity-50 group-hover:opacity-100 transition-opacity duration-500"></div>
        <div class="relative w-16 h-16 bg-velocity-pink rounded-2xl flex items-center justify-center shadow-lg shadow-velocity-pink/20">
            <span class="font-headline-lg-mobile text-[32px] italic font-black tracking-tighter text-pure-white leading-none">IZ</span>
        </div>
    </div>
    <div class="flex flex-col items-center gap-1">
        <span class="font-display-lg text-[40px] text-deep-track tracking-tighter leading-none">Izuke</span>
        <h1 class="font-headline-md text-secondary tracking-tight mt-2">Welcome Back</h1>
        <p class="text-on-surface-variant/60 font-body-md text-center">Ready for your next personal best?</p>
    </div>
</div>
<!-- Auth Container -->
<div class="w-full max-w-[400px] animate-in fade-in slide-in-from-bottom-8 duration-1000 delay-200">
<div class="card-panel rounded-3xl p-8 relative overflow-hidden">
<!-- Subtle accent light -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-velocity-pink/5 blur-[60px] rounded-full pointer-events-none"></div>
<form class="space-y-6 relative" onsubmit="event.preventDefault()">
<div class="space-y-2">
<label class="block font-label-caps text-[11px] text-secondary px-1">EMAIL ADDRESS</label>
<input class="w-full h-14 input-field rounded-xl px-4 text-deep-track placeholder:text-on-surface-variant/40 focus:outline-none focus:ring-0" placeholder="runner@izuke.fit" type="email">
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-label-caps text-[11px] text-secondary">PASSWORD</label>
<a class="font-label-caps text-[10px] text-velocity-pink hover:text-primary-container transition-colors" href="#">FORGOT?</a>
</div>
<div class="relative">
<input class="w-full h-14 input-field rounded-xl px-4 text-deep-track placeholder:text-on-surface-variant/40 focus:outline-none focus:ring-0" placeholder="••••••••" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 hover:text-deep-track transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<button class="w-full h-14 velocity-gradient text-pure-white rounded-xl shadow-lg shadow-velocity-pink/20 hover:opacity-95 hover:-translate-y-0.5 transition-all active:translate-y-0 active:scale-[0.98] flex items-center justify-center gap-3 overflow-hidden relative group">
<div class="absolute inset-0 shimmer pointer-events-none opacity-30 group-hover:opacity-50 transition-opacity"></div>
<span class="relative font-headline-md text-body-lg font-bold tracking-tight">Sign In</span>
<span class="relative material-symbols-outlined text-[20px]" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
</button>
</form>
<div class="mt-8">
<div class="flex items-center gap-4 mb-8">
<div class="h-px flex-1 bg-surface-variant"></div>
<span class="font-label-caps text-[10px] text-secondary/40 uppercase tracking-[0.2em]">OR JOIN WITH</span>
<div class="h-px flex-1 bg-surface-variant"></div>
</div>
<div class="grid grid-cols-3 gap-4">
<button aria-label="Sign in with Apple" class="h-14 social-btn rounded-xl flex items-center justify-center transition-transform active:scale-90">

</button>
<button aria-label="Sign in with Google" class="h-14 social-btn rounded-xl flex items-center justify-center transition-transform active:scale-90">
<svg class="w-6 h-6" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg>
</button>
<button aria-label="Sign in with Facebook" class="h-14 social-btn rounded-xl flex items-center justify-center transition-transform active:scale-90">
<svg class="w-6 h-6 fill-current text-[#1877F2]" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"></path></svg>
</button>

<!-- Footer Link -->
<div class="text-center mt-12 animate-in fade-in slide-in-from-bottom-2 duration-1000 delay-500">
<p class="font-body-md text-secondary">
                Don't have an account? 
                <a class="text-velocity-pink font-bold hover:text-primary-container transition-colors underline-offset-8 decoration-2 hover:underline" href="#">Join the pack</a>
</p>
</div>
</div>
<!-- Background Elements -->
<div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-1/4 -left-1/4 w-[600px] h-[600px] bg-velocity-pink/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-1/4 -right-1/4 w-[600px] h-[600px] bg-blue-500/5 blur-[120px] rounded-full"></div>
</div>
</main>
<script>
    // Micro-interaction for inputs
    document.querySelectorAll('.input-field').forEach(input => {
        const label = input.closest('.space-y-2').querySelector('label');
        input.addEventListener('focus', () => {
            if(label) label.style.color = '#FF3B5C';
        });
        input.addEventListener('blur', () => {
            if(label) label.style.color = '';
        });
    });

    // Toggle password visibility
    const toggleBtn = document.querySelector('[data-icon="visibility_off"]').parentElement;
    const passInput = toggleBtn.parentElement.querySelector('input');
    toggleBtn.addEventListener('click', () => {
        const isPass = passInput.type === 'password';
        passInput.type = isPass ? 'text' : 'password';
        toggleBtn.querySelector('span').textContent = isPass ? 'visibility' : 'visibility_off';
        toggleBtn.querySelector('span').setAttribute('data-icon', isPass ? 'visibility' : 'visibility_off');
    });
</script>


</body></html>
