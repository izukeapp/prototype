<script>
    // Atmospheric parallax on scroll
    window.addEventListener('scroll', () => {
        const scrolled = window.pageYOffset;
        const heroImg = document.querySelector('header img');
        const heroText = document.querySelector('header .relative.z-20');
        const heroBgA = document.querySelector('header .select-none');
        
        if (heroImg) heroImg.style.transform = `translateY(${scrolled * 0.2}px) scale(${1.05 + scrolled * 0.0002})`;
        if (heroText) heroText.style.opacity = Math.max(0, 1 - (scrolled / 350));
        if (heroBgA) heroBgA.style.transform = `translateY(${scrolled * 0.1}px)`;
    });

    // Touch Feedback
    document.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('touchstart', function() {
            this.classList.add('scale-95');
        });
        btn.addEventListener('touchend', function() {
            this.classList.remove('scale-95');
        });
    });
</script>
