<body class="bg-surface-mist text-on-surface min-h-screen font-body-md">
<!-- TopAppBar - Shell Visibility Rule: Task-Focused screens use Back/Close -->
<header class="flex justify-between items-center w-full px-margin-mobile py-4 sticky top-0 z-40 bg-surface-mist/95 backdrop-blur-md border-b border-outline-variant">
<button class="text-deep-track hover:opacity-70 transition-opacity flex items-center" onclick="window.history.back()">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 600;">close</span>
</button>
<h1 class="font-display-lg text-headline-md text-velocity-pink font-extrabold tracking-tight">Izuke</h1>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-velocity-pink/20">
<img alt="User profile" class="w-full h-full object-cover" data-alt="A professional close-up portrait of a fit marathon runner with short dark hair, wearing a high-performance navy blue compression shirt. The lighting is bright and natural, reflecting a clean and modern sports aesthetic. The background is a soft-focus athletic track under a clear morning sky, emphasizing a mood of discipline and readiness. The overall image has a sharp, high-contrast digital photography style consistent with a premium fitness application." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBIuuE75EvXnHpf39GcjjBmX7V-2Du_HmU5MjvN1_uZG3puXoT_tbh6Adk0BaLyBWztZrPRvVt4D-wUGb9UtjVwFu-QM3DVLY4K7HXg7WNoZzSMrEXK9EyciwfOM0SJZQVjrdmslPodSCgCt1jXeSMsHIVlo2BybmLduCj2XKg8VltzVXaJ4m2q3Jwy3cbJ5XFkK-lXEzPVFYtFyYdXsYPTerSyG5LnYYJVuHLnoZH2mr2LPWx8RXwJqFICjVC7cIfpDbAtn_txHBBj">
</div>
</header>
<main class="max-w-screen-md mx-auto px-margin-mobile pt-stack-lg pb-32">
<!-- Header Text -->
<div class="mb-stack-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-deep-track">Log Your Run</h2>
<p class="font-body-md text-on-surface-variant mt-2">Document your performance to keep the momentum going.</p>
</div>
<form class="space-y-gutter" id="logRunForm">
<!-- Metric Bento Grid -->
<div class="flex justify-end mb-2 md:hidden">
    <div class="flex bg-surface-container-high rounded-lg p-0.5">
        <button class="px-3 py-1 font-label-caps text-[10px] rounded bg-velocity-pink text-pure-white transition-all" type="button">mi</button>
        <button class="px-3 py-1 font-label-caps text-[10px] rounded text-on-surface-variant transition-all" type="button">km</button>
    </div>
</div><div class="grid grid-cols-2 gap-stack-md">
    <!-- Distance Card -->
    <div class="bg-surface-container-low border border-outline-variant rounded-xl p-4 md:p-6 transition-all">
        <label class="font-label-caps text-[10px] md:text-label-caps text-on-surface-variant mb-2 block">Distance (mi)</label>
        <div class="flex justify-between items-end">
            <span class="text-headline-lg font-display-lg text-deep-track">0.0</span>
            <div class="hidden md:flex flex-col bg-surface-variant rounded-lg p-0.5">
                <button class="px-2 py-0.5 font-label-caps text-[10px] rounded bg-velocity-pink text-pure-white transition-all" type="button">mi</button>
                <button class="px-2 py-0.5 font-label-caps text-[10px] rounded text-on-surface-variant hover:bg-surface-container transition-all" type="button">km</button>
            </div>
        </div>
    </div>
    <!-- Duration Card -->
    <div class="bg-surface-container-low border border-outline-variant rounded-xl p-4 md:p-6 transition-all">
        <label class="font-label-caps text-[10px] md:text-label-caps text-on-surface-variant mb-2 block">Duration</label>
        <div class="flex justify-between items-end">
            <span class="text-headline-lg font-display-lg text-deep-track">44:00</span>
            <span class="material-symbols-outlined text-surface-dim text-xl">timer</span>
        </div>
    </div>
</div>
<!-- Intensity Chip Group -->
<div class="border-outline-variant rounded-xl p-6"><label class="font-label-caps text-label-caps text-on-surface-variant mb-4 block uppercase">How was it?</label>
<div class="grid grid-cols-4 gap-2">
    <div class="relative">
        
        <label class="flex flex-col items-center justify-center py-3 border border-outline-variant rounded-xl bg-surface-container-low cursor-pointer transition-all hover:bg-surface-variant" for="easy-new">
            <span class="font-body-md font-semibold">Easy</span>
        </label>
    </div>
    <div class="relative">
        
        <label class="flex flex-col items-center justify-center py-3 border border-velocity-pink bg-velocity-pink text-pure-white rounded-xl cursor-pointer transition-all" for="moderate-new">
            <span class="font-body-md font-semibold">Moderate</span>
        </label>
    </div>
    <div class="relative">
        
        <label class="flex flex-col items-center justify-center py-3 border border-outline-variant rounded-xl bg-surface-container-low cursor-pointer transition-all hover:bg-surface-variant" for="hard-new">
            <span class="font-body-md font-semibold">Hard</span>
        </label>
    </div>
    <div class="relative">
        
        <label class="flex flex-col items-center justify-center py-3 border border-outline-variant rounded-xl bg-surface-container-low cursor-pointer transition-all hover:bg-surface-variant" for="pr-new">
            <span class="font-body-md font-semibold flex items-center gap-1">PR! 🏆</span>
        </label>
    </div>
</div></div>
<!-- Note Text Area -->

<!-- Image Upload Area -->

<div class="flex flex-col items-center justify-center cursor-pointer" onclick="document.getElementById('fileUpload').click()">
<div class="w-16 h-16 bg-surface-mist rounded-full flex items-center justify-center mb-4 group-hover:bg-velocity-pink/10 transition-colors">
<span class="material-symbols-outlined text-deep-track group-hover:text-velocity-pink transition-colors text-3xl">add_a_photo</span>
</div>
<span class="font-label-caps text-label-caps text-on-surface-variant">UPLOAD RUN PHOTO</span>
<p class="text-[12px] text-surface-dim mt-1">Capture the moment</p>
<input class="hidden" id="fileUpload" type="file">
</div>
</div>
</form>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full bg-pure-white/80 backdrop-blur-xl border-t border-outline-variant px-margin-mobile py-6 z-50">
<div class="max-w-screen-md mx-auto">
<button class="w-full h-14 bg-velocity-pink hover:bg-primary-container text-pure-white rounded-full font-headline-md text-headline-md flex items-center justify-center gap-2 shadow-lg shadow-velocity-pink/20 active:scale-[0.98] transition-all" form="logRunForm" type="submit">
<span class="">Save Run</span>
<span class="material-symbols-outlined">send</span>
</button>
</div>
</div>
<!-- Interaction Script -->
<script>
        document.getElementById('logRunForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalHtml = btn.innerHTML;
            
            // Micro-interaction: Loading state
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span><span>Saving...</span>`;
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span><span>Run Logged!</span>`;
                btn.classList.replace('bg-velocity-pink', 'bg-tertiary-container');
                
                setTimeout(() => {
                    // Reset or Redirect logic would go here
                    btn.innerHTML = originalHtml;
                    btn.classList.replace('bg-tertiary-container', 'bg-velocity-pink');
                    btn.disabled = false;
                }, 2000);
            }, 1200);
        });

        // Unit Switcher Toggle
        const unitBtns = document.querySelectorAll('.flex.flex-col.bg-surface-mist button');
        unitBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                unitBtns.forEach(b => {
                    b.classList.remove('bg-deep-track', 'text-pure-white');
                    b.classList.add('text-deep-track/40');
                });
                btn.classList.add('bg-deep-track', 'text-pure-white');
                btn.classList.remove('text-deep-track/40');
            });
        });
    </script>
