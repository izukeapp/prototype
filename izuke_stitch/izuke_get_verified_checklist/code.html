<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Izuke - Get Verified</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Hanken Grotesk -->
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'izuke-pink': '#FF3B5C', // Velocity Pink
            'izuke-bg': '#F9F9FB',
            'izuke-gray-text': '#6B7280',
            'izuke-green': '#10B981',
          },
          fontFamily: {
            'hanken': ['"Hanken Grotesk"', 'sans-serif'],
          },
          borderRadius: {
            '3xl': '1.5rem',
          }
        }
      }
    }
  </script>
<style data-purpose="base-typography">
    body {
      font-family: 'Hanken Grotesk', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
<style data-purpose="layout-adjustments">
    /* Ensure the mobile view feels like a native app */
    .ios-status-bar-height {
      height: 44px; /* Standard iOS status bar approx */
    }
    .safe-area-bottom {
      padding-bottom: env(safe-area-inset-bottom, 24px);
    }
  </style>
</head>
<body class="bg-white text-gray-900 min-h-screen flex flex-col">
<!-- BEGIN: Navigation Header -->
<header class="flex items-center justify-between px-6 py-4 mt-2">
<button aria-label="Go back" class="p-2 -ml-2" data-purpose="back-button">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" viewBox="0 0 24 24" width="24">
<polyline points="15 18 9 12 15 6"></polyline>
</svg>
</button>
<h1 class="text-lg font-bold text-gray-800">Get Verified</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- END: Navigation Header -->
<main class="flex-grow flex flex-col px-8 pt-10">
<!-- BEGIN: Hero Section -->
<section class="flex flex-col items-center text-center mb-10" data-purpose="hero-section">
<!-- Shield Icon Container -->
<div class="w-24 h-24 bg-pink-50 rounded-full flex items-center justify-center mb-8">
<svg class="text-izuke-pink" fill="none" height="48" viewBox="0 0 24 28" width="40" xmlns="http://www.w3.org/2000/svg">
<path d="M12 1L3 5V11C3 16.55 6.84 21.74 12 23C17.16 21.74 21 16.55 21 11V5L12 1Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<h2 class="text-3xl font-extrabold tracking-tight mb-4">Verified Badge</h2>
<p class="text-izuke-gray-text leading-relaxed px-4">
        Take a quick selfie to confirm you're a real person. Takes under 30 seconds.
      </p>
</section>
<!-- END: Hero Section -->
<!-- BEGIN: Progress Checklist -->
<section class="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-50 p-6 space-y-8" data-purpose="verification-steps">
<!-- Step 1: Completed -->
<div class="flex items-start gap-4">
<div class="flex-shrink-0 w-8 h-8 bg-izuke-green rounded-full flex items-center justify-center">
<svg fill="none" height="18" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" viewBox="0 0 24 24" width="18">
<polyline points="20 6 9 17 4 12"></polyline>
</svg>
</div>
<div>
<h3 class="font-bold text-gray-900">Account Created</h3>
<p class="text-sm text-gray-400">Done ✓</p>
</div>
</div>
<!-- Step 2: Active -->
<div class="flex items-start gap-4">
<div class="flex-shrink-0 w-8 h-8 bg-izuke-pink rounded-full flex items-center justify-center text-white font-bold">
          2
        </div>
<div>
<h3 class="font-bold text-gray-900">Face Selfie</h3>
<p class="text-sm text-izuke-gray-text">Quick photo to confirm it's you</p>
</div>
</div>
<!-- Step 3: Inactive -->
<div class="flex items-start gap-4">
<div class="flex-shrink-0 w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 font-bold">
          3
        </div>
<div>
<h3 class="font-bold text-gray-400">Done</h3>
<p class="text-sm text-gray-300">Your verified badge is live</p>
</div>
</div>
</section>
<!-- END: Progress Checklist -->
</main>
<!-- BEGIN: Footer Actions -->
<footer class="px-6 safe-area-bottom mt-auto mb-8">
<div class="flex flex-col gap-4">
<!-- Primary Action Button -->
<button class="w-full text-white py-5 rounded-3xl font-bold text-lg flex items-center justify-center gap-2 shadow-lg active:scale-[0.98] transition-transform bg-gradient-to-r from-izuke-pink to-[#ff1e4d] shadow-[0_10px_25px_-5px_rgba(255,59,92,0.4)]" data-purpose="start-verification-btn">
<!-- Optional Lightning Icon if matching brand -->
<span class="">Start Verification</span>
</button>
<!-- Secondary Action Link -->
<button class="w-full py-2 text-izuke-gray-text font-medium hover:text-gray-900 transition-colors" data-purpose="skip-link">
        Maybe Later
      </button>
</div>
</footer>
<!-- END: Footer Actions -->


</body></html>
