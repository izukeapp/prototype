<body class="bg-mesh-gradient min-h-screen flex flex-col font-body-md text-on-surface antialiased overflow-x-hidden">
<!-- Header Section -->
<header class="flex flex-col items-center pt-16 pb-8 px-margin-mobile">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center mb-4 shadow-lg shadow-primary/10">
<span class="font-display-lg text-pure-white tracking-tighter" style="font-size: 24px; line-height: 1;">IZ</span>
</div>
<div class="flex flex-col items-center gap-2">
<span class="font-headline-lg text-deep-track tracking-tight leading-none" style="font-size: 32px;">Izuke</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-deep-track text-center">Join the pack</h1>
</div>
<p class="font-body-md text-on-surface-variant mt-2 text-center max-w-[280px]">Experience the runner's high with the ultimate social fitness community.</p>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col items-center px-margin-mobile w-full max-w-md mx-auto">
<div class="w-full space-y-stack-lg">
<!-- Form Card -->
<div class="bg-pure-white rounded-3xl border border-surface-variant p-8 space-y-6">
<!-- Full Name Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-widest">Full Name</label>
<div class="relative">
<input class="w-full h-14 px-4 rounded-xl border-2 border-surface-variant focus:border-deep-track focus:ring-0 transition-colors font-body-md placeholder:text-surface-dim" placeholder="Alex Walker" type="text">
<span class="material-symbols-outlined absolute right-4 top-4 text-surface-dim">person</span>
</div>
</div>
<!-- Email Address Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-widest">Email Address</label>
<div class="relative">
<input class="w-full h-14 px-4 rounded-xl border-2 border-surface-variant focus:border-deep-track focus:ring-0 transition-colors font-body-md placeholder:text-surface-dim" placeholder="alex@runizuke.com" type="email">
<span class="material-symbols-outlined absolute right-4 top-4 text-surface-dim">mail</span>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-widest">Password</label>
<a class="font-label-caps text-[10px] text-velocity-pink hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full h-14 px-4 pr-12 rounded-xl border-2 border-surface-variant focus:border-deep-track focus:ring-0 transition-colors font-body-md placeholder:text-surface-dim" id="password-input" placeholder="••••••••" type="password">
<button class="absolute right-4 top-4 text-surface-dim hover:text-deep-track transition-colors" onclick="togglePassword()">
<span class="material-symbols-outlined" id="password-toggle-icon">visibility</span>
</button>
</div>
</div>
<!-- Sign Up Button -->
<button class="w-full h-14 bg-gradient-to-r from-velocity-pink to-primary flex items-center justify-center space-x-2 text-pure-white font-headline-md text-body-lg shadow-xl shadow-velocity-pink/20 hover:opacity-90 active:scale-[0.98] transition-all group rounded-3xl">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-headline-md">Sign Up</span>
</button>
</div>
<!-- Social/Switch Section -->
<div class="flex flex-col items-center space-y-6 pb-12">
<p class="font-body-md text-on-surface-variant">
                    Already have an account? 
                    <a class="text-velocity-pink font-bold hover:underline" href="#">Sign In</a>
</p>
<!-- Terms Disclaimer -->
<p class="text-[11px] text-center text-surface-dim leading-relaxed px-4">
                    By signing up, you agree to our <span class="underline">Terms of Service</span> and <span class="underline">Privacy Policy</span>. We promise to keep your data safe and focused on your gains.
                </p>
</div>

</main>
<!-- Visual Polish: Floating Elements (Subtle Atmospheric Effects) -->
<div class="fixed top-1/4 -left-12 w-64 h-64 bg-velocity-pink/5 rounded-full blur-[80px] -z-10 pointer-events-none"></div>
<div class="fixed bottom-0 -right-12 w-80 h-80 bg-primary/5 rounded-full blur-[100px] -z-10 pointer-events-none"></div>
<script>
        function togglePassword() {
            const input = document.getElementById('password-input');
            const icon = document.getElementById('password-toggle-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // Add a subtle parallax to the background blobs on mouse move (Desktop Only)
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 768) {
                const blobs = document.querySelectorAll('.fixed.-z-10');
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                
                blobs.forEach((blob, index) => {
                    const factor = (index + 1) * 20;
                    blob.style.transform = `translate(${x * factor}px, ${y * factor}px)`;
                });
            }
        });
    </script>
