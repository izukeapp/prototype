<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Izuke – Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,700;0,800;0,900;1,900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #d9dadc; }

  .phone {
    width: 390px;
    min-height: 844px;
    background: #ffffff;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 32px 80px rgba(0,0,0,0.18);
    border-radius: 48px;
  }

  /* Entrance */
  .fade-up {
    opacity: 0;
    transform: translateY(16px);
    animation: fade-up 0.5s ease-out forwards;
  }
  @keyframes fade-up {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Glow blob behind branding */
  .glow {
    position: absolute;
    width: 240px; height: 240px;
    background: radial-gradient(circle, #FF3B5C 0%, transparent 70%);
    border-radius: 50%;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    filter: blur(70px);
    opacity: 0.08;
    pointer-events: none;
  }

  /* Branding */
  .logo-mark {
    width: 60px; height: 60px;
    border-radius: 18px;
    background: linear-gradient(135deg, #FF3B5C 0%, #BA0035 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(255,59,92,0.30);
    flex-shrink: 0;
  }
  .logo-mark span {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 900; font-style: italic;
    font-size: 26px; color: #fff;
    letter-spacing: -0.04em; line-height: 1;
  }

  /* Auth buttons */
  .auth-btn {
    width: 100%; height: 52px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 0 18px;
    border-radius: 14px;
    background: #fff;
    border: 1.5px solid #e2e2e4;
    font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 400;
    color: #1a1c1d;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    text-align: center;
  }
  .auth-btn:active { transform: scale(0.98); background: #f5f5f7; }
  .auth-btn .icon-wrap { width: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* Divider */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 4px 0;
  }
  .divider hr { flex: 1; border: none; border-top: 1px solid #e2e2e4; }
  .divider span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: #999;
  }
</style>
</head>

<body style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
<div class="phone">

  <div class="glow"></div>

  <!-- Branding -->
  <div class="fade-up" style="display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; gap:10px; padding:0 28px; animation-delay:0.05s;">
    <div class="logo-mark"><span>IZ</span></div>
    <p style="font-family:'Inter',sans-serif; font-size:15px; font-weight:400; color:#535e7b; text-align:center; line-height:1.5; margin-top:6px;">Welcome back, sign in to find<br>your next run match.</p>
  </div>

  <!-- Auth buttons -->
  <div class="fade-up" style="display:flex; flex-direction:column; gap:10px; padding:0 24px 40px; animation-delay:0.15s;">

    <!-- Google -->
    <button class="auth-btn" onclick="window.location.href='setup_1.html'">
      <span class="icon-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
      </span>
      Continue with Google
    </button>

    <!-- Apple -->
    <button class="auth-btn" onclick="window.location.href='setup_1.html'">
      <span class="icon-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#1a1c1d">
          <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2.044-.156-3.07 1.09-4.21 1.091zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.702z"/>
        </svg>
      </span>
      Continue with Apple
    </button>

    <!-- Facebook -->
    <button class="auth-btn" onclick="window.location.href='setup_1.html'">
      <span class="icon-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
      </span>
      Continue with Facebook
    </button>

    <div class="divider">
      <hr><span>or</span><hr>
    </div>

    <!-- Email -->
    <button class="auth-btn" onclick="window.location.href='email_auth.html'">
      <span class="icon-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#535e7b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
        </svg>
      </span>
      Continue with Email
    </button>

    <!-- Legal -->
    <p style="font-family:'Inter',sans-serif; font-size:11px; color:#999; text-align:center; line-height:1.6; margin-top:4px;">
      By continuing you agree to our
      <span style="color:#FF3B5C; cursor:pointer;">Terms</span> &amp;
      <span style="color:#FF3B5C; cursor:pointer;">Privacy Policy</span>
    </p>

  </div>

</div>
</body>
</html>
