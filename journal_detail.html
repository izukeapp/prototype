<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Izuke – Journal Entry</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #d9dadc; font-family: 'Inter', sans-serif; }

  .phone {
    width: 390px;
    height: 844px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 32px 80px rgba(0,0,0,0.18);
    border-radius: 48px;
    background: linear-gradient(160deg, #5FB4F0 0%, #3B6FE0 100%);
  }

  /* Background photo with slow Ken Burns zoom */
  .bg-photo {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover; z-index: 0;
    transform: scale(1.05);
    animation: kenburns 18s ease-out forwards;
  }
  @keyframes kenburns {
    from { transform: scale(1.05); }
    to   { transform: scale(1.18); }
  }
  .bg-scrim {
    position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(to bottom,
      rgba(15,27,53,0.45) 0%, rgba(15,27,53,0.15) 30%,
      rgba(15,27,53,0.15) 55%, rgba(15,27,53,0.75) 100%);
  }

  /* Status bar */
  .statusbar {
    position: relative; z-index: 3;
    height: 48px; display: flex; align-items: center; padding: 0 24px;
    flex-shrink: 0;
    font-family: 'Hanken Grotesk', sans-serif; font-weight: 700; font-size: 15px;
    color: rgba(255,255,255,0.90);
    text-shadow: 0 1px 5px rgba(15,27,53,0.45);
  }

  /* Top bar */
  .top-bar {
    position: relative; z-index: 3;
    padding: 8px 20px 0;
    flex-shrink: 0;
  }
  .top-bar-inner { position: relative; display: flex; align-items: center; justify-content: space-between; }
  .glass-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.14);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.90); cursor: pointer;
    transition: transform 0.1s;
  }
  .glass-btn:active { transform: scale(0.92); }
  .nav-date {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 700; font-size: 15px; color: rgba(255,255,255,0.92);
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 8px 18px; border-radius: 9999px;
    white-space: nowrap;
  }

  /* Center hero */
  .center {
    position: relative; z-index: 3;
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 0 24px;
    text-align: center;
  }
  .center-glass {
    background: rgba(15,27,53,0.38);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 32px 36px;
    display: flex; flex-direction: column; align-items: center;
  }
  .big-dist {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 900; font-size: 60px; color: rgba(255,255,255,0.90);
    letter-spacing: -0.03em; line-height: 1;
  }
  .big-dist .unit {
    font-size: 26px; font-weight: 700;
    color: rgba(255,255,255,0.6); margin-left: 4px;
    letter-spacing: 0;
  }
  /* date + privacy line */
  .meta-line {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-bottom: 18px;
  }
  .meta-line .date {
    font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.82);
  }
  .meta-line .dot { color: rgba(255,255,255,0.4); }
  .meta-line .priv {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: rgba(255,255,255,0.7);
  }
  .meta-line .priv .material-symbols-outlined { font-size: 13px !important; }
  .note {
    font-family: 'Hanken Grotesk', sans-serif;
    font-style: italic; font-weight: 600; font-size: 21px;
    color: rgba(255,255,255,0.78);
    margin-top: 14px;
  }

  /* Bottom stats glass card */
  .stats-card {
    position: relative; z-index: 3;
    margin: 0 20px 36px;
    background: rgba(15,27,53,0.22);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 22px;
    display: flex; align-items: center;
    padding: 18px 0;
    flex-shrink: 0;
  }
  .stat {
    flex: 1; text-align: center;
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat + .stat { border-left: 1px solid rgba(255,255,255,0.14); }
  .stat .val {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 800; font-size: 22px; color: rgba(255,255,255,0.90);
  }
  .stat .val .u {
    font-size: 13px; font-weight: 700;
    color: rgba(255,255,255,0.55); margin-left: 2px;
  }
  .stat .lbl { font-size: 13px; color: rgba(255,255,255,0.65); }
  .stat .feel-pill {
    align-self: center;
    padding: 6px 16px; border-radius: 9999px;
    font-family: 'Hanken Grotesk', sans-serif; font-weight: 700; font-size: 15px;
    color: #fff;
  }
  .feel-pill.easy     { background: #16A34A; }
  .feel-pill.moderate { background: #FF3B5C; }
  .feel-pill.hard     { background: #BA0035; }
  .feel-pill.pr       { background: #E0A800; }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
  }
</style>
</head>

<body style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
<div class="phone">

  <!-- Background photo -->
  <img class="bg-photo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBMulCzMzQa3vQmlqP_T2gK6Pu4ZfcI4OGq5FVYZnHb55fxdLVHsseg5XDTy353fVYrnDY-gueCO0BSKafyUGaPNJoD36BdQ6TG1mjJBw_n5ZFLqckj_bEzPGfnmmUSNMhL1HDcsFR6xoBQXtZaFxt_Ugf2nFz0RRC3xdoBx1ibFvXWN0jvG7mLCHJ7HYAX6kWgDVwanpxU1xo_rnuQlazbkj5BuvIk9UryAZaPk3YydV3Qjr1c4LiqcqF0GoceIxpAuqXBV2HfPtoi" alt="Run photo">
  <div class="bg-scrim"></div>

  <!-- Status bar -->
  <div class="statusbar">9:41</div>

  <!-- Top bar -->
  <div class="top-bar">
    <div class="top-bar-inner">
      <button class="glass-btn" onclick="window.location.href='journal.html'">
        <span class="material-symbols-outlined" style="font-size:22px;">arrow_back</span>
      </button>
      <span class="nav-date">May 31</span>
      <button class="glass-btn">
        <span class="material-symbols-outlined" style="font-size:20px;">delete</span>
      </button>
    </div>
  </div>

  <!-- Center hero -->
  <div class="center">
    <div class="center-glass">
      <div class="big-dist">12.0<span class="unit">km</span></div>
      <div class="note">I loved it!</div>
    </div>
  </div>

  <!-- Bottom stats -->
  <div class="stats-card">
    <div class="stat">
      <span class="val">0<span class="u">min</span></span>
      <span class="lbl">Duration</span>
    </div>
    <div class="stat">
      <span class="val">0:00<span class="u">/km</span></span>
      <span class="lbl">Pace</span>
    </div>
    <div class="stat">
      <span class="feel-pill hard">Hard</span>
      <span class="lbl">Feel</span>
    </div>
  </div>

</div>
</body>
</html>
