<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Izuke – Get Verified</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #d9dadc; font-family: 'Hanken Grotesk', sans-serif; }

  .phone {
    width: 390px;
    height: 844px;
    background: #ffffff;
    position: relative;
    display: flex;
    flex-direction: column;
    box-shadow: 0 32px 80px rgba(0,0,0,0.18);
    border-radius: 48px;
    overflow: hidden;
  }

  /* Nav bar */
  .nav-bar {
    height: 56px;
    display: flex; align-items: center;
    padding: 0 20px;
    background: #fff;
    flex-shrink: 0;
    position: relative;
  }
  .nav-back {
    width: 40px; height: 40px;
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #1a1c1d; margin-left: -8px;
  }
  .nav-title {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 700; font-size: 18px; color: #374151;
  }

  /* Body */
  .body {
    flex: 1;
    display: flex; flex-direction: column;
    padding: 24px 32px 0;
    overflow-y: auto;
  }
  .body::-webkit-scrollbar { display: none; }

  /* Hero */
  .hero { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 40px; }
  .hero-icon {
    width: 96px; height: 96px; border-radius: 50%;
    background: #fdf2f4;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 32px;
  }
  .hero h2 {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 800; font-size: 30px; letter-spacing: -0.02em;
    color: #111827; margin-bottom: 16px;
  }
  .hero p {
    font-size: 16px; color: #6B7280; line-height: 1.6;
    padding: 0 8px;
  }

  /* Checklist card */
  .checklist {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.04);
    border: 1px solid #fafafa;
    padding: 24px;
    display: flex; flex-direction: column; gap: 32px;
  }
  .step { display: flex; align-items: flex-start; gap: 16px; }
  .step-badge {
    flex-shrink: 0;
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 700; font-size: 15px;
  }
  .step-badge.done { background: #10B981; color: #fff; }
  .step-badge.active { background: #FF3B5C; color: #fff; }
  .step-badge.inactive { background: #f3f4f6; color: #9ca3af; }
  .step h3 {
    font-family: 'Hanken Grotesk', sans-serif;
    font-weight: 700; font-size: 16px; color: #111827;
  }
  .step h3.muted { color: #9ca3af; }
  .step p { font-size: 14px; margin-top: 2px; }
  .step p.done { color: #9ca3af; }
  .step p.active { color: #6B7280; }
  .step p.inactive { color: #d1d5db; }

  /* Footer */
  .footer {
    margin-top: auto;
    padding: 16px 24px 32px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .btn-primary {
    width: 100%; height: 56px;
    border: none; border-radius: 9999px;
    background: linear-gradient(135deg, #FF3B5C 0%, #BA0035 100%);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-weight: 500; font-size: 16px;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(255,59,92,0.28);
    transition: transform 0.15s;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-skip {
    width: 100%; padding: 8px;
    background: none; border: none; cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-weight: 500; font-size: 16px; color: #6B7280;
    transition: color 0.15s;
  }
  .btn-skip:hover { color: #111827; }
</style>
</head>

<body style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
<div class="phone">

  <!-- Status bar -->
  <div style="height:48px; display:flex; align-items:center; padding:0 24px; flex-shrink:0;">
    <span style="font-family:'Hanken Grotesk',sans-serif; font-weight:700; font-size:15px; color:#111827;">9:41</span>
  </div>

  <!-- Nav bar -->
  <div class="nav-bar">
    <button class="nav-back" onclick="window.location.href='discover.html'">
      <svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" viewBox="0 0 24 24" width="24">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    <span class="nav-title">Get Verified</span>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Hero -->
    <div class="hero">
      <div class="hero-icon">
        <svg class="" fill="none" height="48" viewBox="0 0 24 28" width="40" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1L3 5V11C3 16.55 6.84 21.74 12 23C17.16 21.74 21 16.55 21 11V5L12 1Z" stroke="#FF3B5C" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
        </svg>
      </div>
      <h2>Verified Badge</h2>
      <p>Take a quick selfie to confirm you're a real person. Takes under 30 seconds.</p>
    </div>

    <!-- Checklist -->
    <div class="checklist">

      <!-- Step 1: Completed -->
      <div class="step">
        <div class="step-badge done">
          <svg fill="none" height="18" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" viewBox="0 0 24 24" width="18">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <div>
          <h3>Account Created</h3>
          <p class="done">Done &#10003;</p>
        </div>
      </div>

      <!-- Step 2: Active -->
      <div class="step">
        <div class="step-badge active">2</div>
        <div>
          <h3>Face Selfie</h3>
          <p class="active">Quick photo to confirm it's you</p>
        </div>
      </div>

      <!-- Step 3: Inactive -->
      <div class="step">
        <div class="step-badge inactive">3</div>
        <div>
          <h3 class="muted">Done</h3>
          <p class="inactive">Your verified badge is live</p>
        </div>
      </div>

    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-primary" onclick="window.location.href='discover.html'">Start Verification</button>
    <button class="btn-skip" onclick="window.location.href='discover.html'">Maybe Later</button>
  </div>

</div>
</body>
</html>
